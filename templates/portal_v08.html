    async function changeAssignee(assignmentId, userId) {
        const a = state.assignments.find(x => x.id === assignmentId);
        if (a) {
            const parsedUserId = userId ? (isNaN(userId) ? userId : parseInt(userId)) : null;

            const stageName = (a.levels && a.levels.length > 0) ? a.levels[a.currentLevelIndex] : 'Final';
            if (!a.stageAssignees) a.stageAssignees = {};
            a.stageAssignees[stageName] = parsedUserId;
            a.assignedTo = parsedUserId;

            // NEW: Prompt for Stage Mandays
            if (parsedUserId) {
                const mandaysStr = await askForStageMandays(stageName);
                if (mandaysStr !== null && !isNaN(mandaysStr) && String(mandaysStr).trim() !== "") {
                    if (!a.inputData) a.inputData = {};
                    if (!a.inputData.stageMandays) a.inputData.stageMandays = {};
                    a.inputData.stageMandays[stageName] = parseFloat(mandaysStr);
                }
            }

            try {
                await fetch(`/api/assignments/${a.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        assignedTo: a.assignedTo,
                        stageAssignees: a.stageAssignees,
                        inputData: a.inputData
                    })
                });

                showToast("Assignee & Budget updated for " + stageName);
                syncLocalSnapshot();
                renderDashboard();

                if (parsedUserId) {
                    const amount = await askForPaymentAmount(a.name, stageName);
                    if (amount !== null && !isNaN(amount)) {
                        let formattedUserId = String(parsedUserId);
                        if (!formattedUserId.startsWith('u')) formattedUserId = 'u' + formattedUserId;
                        const newInvoice = { id: 'inv' + Date.now(), roleType: 'freelancer', targetUserId: formattedUserId, paymentType: 'pay', projectId: a.projectId, assignmentId: a.id, stage: stageName, issueDate: new Date().toISOString().split('T')[0], dueDate: '', description: `Auto-generated for ${a.name} - ${stageName}`, amount: amount, status: 'pending', createdAt: Date.now() };
                        showToast("Generating record...");
                        const invRes = await fetch('/api/invoices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(newInvoice) });
                        if (invRes.ok) { if (!state.invoices) state.invoices = []; state.invoices.push(newInvoice); showToast("Record saved successfully!"); }
                        else { showToast("Failed to create invoice record", true); }
                    }
                }
            } catch (e) { showToast("Failed to update assignee", true); }
        }
    }


    function renderStagesTimeline(a) {
        if (!a.levels || a.levels.length <= 1) return '';

        // Added onclick stopPropagation to prevent the card from expanding when clicking the container
        let html = '<div class="flex items-center gap-1 overflow-x-auto hide-scroll py-0.5 shrink-0 max-w-full" onclick="event.stopPropagation()">';

        for (let i = 0; i < a.levels.length; i++) {
            const stageName = a.levels[i];
            let stageClass = ''; let dot = '';

            const currentStageName = (a.levels && a.levels.length > 0) ? a.levels[a.currentLevelIndex] : 'Final';

            // 1. Identify active WIP stage (Color Coded) vs Completed vs Pending
            if (a.status === 'approved') { stageClass = 'bg-green-900/30 text-green-400 border-green-700/50'; }
            else if (i < a.currentLevelIndex) { stageClass = 'bg-green-900/30 text-green-400 border-green-700/50'; }
            else if (i === a.currentLevelIndex) {
                if (a.status === 'retake') {
                    stageClass = 'bg-red-600 text-white border-red-500 font-bold shadow-[0_0_8px_rgba(239,68,68,0.4)]';
                    dot = `<span class="w-1.5 h-1.5 rounded-full bg-red-200 mr-1 animate-pulse inline-block shadow-sm"></span>`;
                } else if (a.status === 'uploaded' || a.status === 'client_approved') {
                    stageClass = 'bg-orange-600 text-white border-orange-500 font-bold shadow-[0_0_8px_rgba(249,115,22,0.4)]';
                    dot = `<span class="w-1.5 h-1.5 rounded-full bg-orange-200 mr-1 animate-pulse inline-block shadow-sm"></span>`;
                } else if (a.status === 'wip') {
                    stageClass = 'bg-yellow-500 text-gray-900 border-yellow-400 font-bold shadow-[0_0_8px_rgba(234,179,8,0.4)]';
                    dot = `<span class="w-1.5 h-1.5 rounded-full bg-yellow-100 mr-1 animate-pulse inline-block shadow-sm"></span>`;
                } else {
                    // Default to blue for "paused" or "hold"
                    stageClass = 'bg-blue-600 text-white border-blue-500 font-bold shadow-[0_0_8px_rgba(59,130,246,0.4)]';
                    dot = `<span class="w-1.5 h-1.5 rounded-full bg-blue-200 mr-1 animate-pulse inline-block shadow-sm"></span>`;
                }
            }
            else { stageClass = 'bg-[#2a2a2a] text-gray-500 border-gray-600/50'; }

            // 2. Calculate Stage Mandays, Elapsed Time, and Last Worker
            let clickAttr = '';
            let cursorClass = '';
            if (state.currentUser.role === 'admin') {
                let sMandays = (a.inputData && a.inputData.stageMandays && a.inputData.stageMandays[stageName]) ? a.inputData.stageMandays[stageName] : 0;

                // Calculate exact time taken for THIS stage
                let sElapsedMs = (a.inputData && a.inputData.stageTimes && a.inputData.stageTimes[stageName]) ? a.inputData.stageTimes[stageName] : 0;

                // If this is the currently running stage, add the live ticking time
                if (stageName === currentStageName && ['wip', 'retake'].includes(a.status)) {
                    const activeTimer = a.timerStartedAt || (a.inputData && a.inputData.timerStartedAt) || Date.now();
                    sElapsedMs += Math.max(0, Date.now() - activeTimer);
                }

                let sElapsedDays = (sElapsedMs / (1000 * 60 * 60 * 24)).toFixed(1);

                // Find the Last Worker for this specific stage
                let lastWorker = 'No uploads';
                if (stageName === currentStageName) {
                    if (a.versions && a.versions.length > 0) {
                        lastWorker = a.versions[0].uploadedBy || 'Unknown';
                    } else if (a.stageAssignees && a.stageAssignees[stageName]) {
                        const assignedUser = state.users.find(u => u.id == a.stageAssignees[stageName]);
                        lastWorker = assignedUser ? assignedUser.name : 'Unassigned';
                    }
                } else {
                    const completedLvl = a.completedLevels ? a.completedLevels.find(cl => cl.levelName === stageName) : null;
                    if (completedLvl && completedLvl.versions && completedLvl.versions.length > 0) {
                        lastWorker = completedLvl.versions[0].uploadedBy || 'Unknown';
                    } else {
                        const stageIndex = a.levels ? a.levels.indexOf(stageName) : -1;
                        if (stageIndex > a.currentLevelIndex) {
                            lastWorker = 'Not started';
                        }
                    }
                }

                let safeWorkerName = lastWorker.replace(/'/g, "\\'").replace(/"/g, "&quot;");

                // Pass Budget, Taken, AND Last Worker to the toggle function
                clickAttr = `onclick="event.stopPropagation(); toggleStageMandays('${a.id}', '${stageName}', ${sMandays}, ${sElapsedDays}, ${a.mandays || 0}, '${safeWorkerName}')"`;
                cursorClass = 'cursor-pointer hover:ring-2 hover:ring-purple-400/70 hover:ring-offset-1 hover:ring-offset-[#3a3a3a]';
            }

            // Generate the button
            html += `<div id="stage-btn-${a.id}-${stageName}" class="flex items-center text-[9px] px-1.5 py-0.5 border rounded-sm whitespace-nowrap transition-all ${stageClass} ${cursorClass}" ${clickAttr}>${dot}${stageName}</div>`;

            // Add connecting lines
            if (i < a.levels.length - 1) {
                const lineClass = (a.status === 'approved' || i < a.currentLevelIndex) ? 'bg-green-700/50' : 'bg-gray-600/50';
                html += `<div class="w-2 h-[1px] ${lineClass} shrink-0"></div>`;
            }
        }
        html += '</div>'; return html;
    }

            });
        }

        let html = '';

                categoryHtml += `

                                        <div class="flex items-center gap-2 text-gray-400">

                                            <span class="truncate max-w-[100px] md:max-w-[140px] italic" title="${inv.description || ''}">${inv.description || 'Transaction'}</span>

                                            <span class="font-mono text-gray-300 font-bold">₹${parseFloat(inv.amount).toLocaleString('en-IN')}</span>

                                        </div>
                                    </div>

                        if (!thumbSrc && project) {

                        categoryHtml += `

                                <div class="flex flex-col mb-4">

                                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-gray-500"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                                <span class="text-sm md:text-base font-extrabold text-white truncate tracking-wide">${aName}</span>
                                            </div>
                                            ${stageLabel ? `<div class="mt-0.5">${stageLabel}</div>` : ''}
                                        </div>
                                    </div>

                                    ${groupInvs.length === 1 ? `<span class="text-xs text-gray-400 leading-relaxed min-h-[1.5rem]" title="${mainInv.description || ''}">${mainInv.description || '<span class="italic opacity-50">General Transaction</span>'}</span>` : ''}
                                    ${txListHtml}
                                </div>
                                <div class="flex flex-col mt-auto">
                                    <div class="flex items-end justify-between w-full">
                                        <div class="flex flex-col">
                                            <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1 flex items-center gap-1.5"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg> ${mainInv.issueDate}</span>

                                        </div>
                                    </div>
                                    ${adminActions}
                                </div>
                            </div>
                        `;
                    });
                    categoryHtml += `</div>`;
                }
                categoryHtml += `</div>`;
            });
            categoryHtml += `</div></div>`;
            return categoryHtml;

        if (isAdmin) {
            html += renderCategory('Clients', clientGroup);

    function updateInvoiceProjectsDropdown(userId) {
        const projectSelect = document.getElementById('invoice-project'); const assignmentSelect = document.getElementById('invoice-assignment'); if (!projectSelect) return; if (assignmentSelect) { assignmentSelect.innerHTML = `<option value="">-- Choose a Project First --</option>`; } if (!userId) { projectSelect.innerHTML = `<option value="">-- Choose a Person First --</option>`; return; }
        const user = state.users.find(u => u.id === userId); if (!user || !user.allowedProjects || user.allowedProjects.length === 0) { projectSelect.innerHTML = `<option value="">-- No assigned projects --</option>`; return; }
        const allowedProjects = state.projects.filter(p => user.allowedProjects.includes(p.id)); if (allowedProjects.length === 0) { projectSelect.innerHTML = `<option value="">-- No assigned projects --</option>`; return; }
        projectSelect.innerHTML = `<option value="">-- Choose a Project --</option>` + allowedProjects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    }

    function updateInvoiceAssignmentsDropdown(projectId) {
        const assignmentSelect = document.getElementById('invoice-assignment');
        const stageSelect = document.getElementById('invoice-stage');
        if (!assignmentSelect) return;
        const dueInput = document.getElementById('invoice-due');
        if (dueInput) dueInput.value = '';
        if (stageSelect) stageSelect.innerHTML = `<option value="">-- Choose an Assignment First --</option>`;
        if (!projectId) { assignmentSelect.innerHTML = `<option value="">-- Choose a Project First --</option>`; return; }
        const targetUser = document.getElementById('invoice-target-user').value;
        const projectAssignments = state.assignments.filter(a => a.projectId === projectId);
        const availableAssignments = projectAssignments.filter(a => {
            const levels = (a.levels && a.levels.length > 0) ? a.levels : ['Final'];
            const billedCount = state.invoices.filter(inv => inv.assignmentId === a.id && inv.targetUserId === targetUser).length;
            return billedCount < levels.length;
        });

        if (availableAssignments.length === 0) {
            assignmentSelect.innerHTML = `<option value="">-- All assignments fully billed --</option>`;
            return;
        }
        assignmentSelect.innerHTML = `<option value="">-- Choose an Assignment --</option>` + availableAssignments.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }

    function handleInvoiceAssignmentChange(assignmentId) {
        const dueInput = document.getElementById('invoice-due');
        const stageSelect = document.getElementById('invoice-stage');
        const targetUser = document.getElementById('invoice-target-user').value;

        if (!assignmentId) {
            if (dueInput) dueInput.value = '';
            if (stageSelect) stageSelect.innerHTML = `<option value="">-- Choose an Assignment First --</option>`;
            return;
        }
        const assignment = state.assignments.find(a => a.id === assignmentId);
        if (assignment && assignment.mandays && assignment.createdAt) {
            const dueDateMs = assignment.createdAt + (assignment.mandays * 24 * 60 * 60 * 1000);
            const d = new Date(dueDateMs);
            if(dueInput) dueInput.value = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        } else {
            if(dueInput) dueInput.value = '';
        }
        if (stageSelect && assignment) {
            const levels = (assignment.levels && assignment.levels.length > 0) ? assignment.levels : ['Final'];
            const billedStages = state.invoices.filter(inv => inv.assignmentId === assignmentId && inv.targetUserId === targetUser).map(inv => inv.stage);
            const unbilledStages = levels.filter(lvl => !billedStages.includes(lvl));

            if (unbilledStages.length === 0) {
                stageSelect.innerHTML = `<option value="">-- All stages billed --</option>`;
            } else {
                stageSelect.innerHTML = `<option value="">-- Choose a Stage --</option>` + unbilledStages.map(lvl => `<option value="${lvl}">${lvl}</option>`).join('');
            }
        }
    }

    function toggleTempAssignmentStage(stage) {
        let current = state.tempAssignmentLevels ? state.tempAssignmentLevels.split(',').map(s => s.trim()).filter(s => s) : [];
        if (current.includes(stage)) { current = current.filter(s => s !== stage); }
        else { current.push(stage); }
        state.tempAssignmentLevels = current.join(', ');
        renderModals();
    }

    async function executeDelete() {
        if (!state.pendingDeletion) return; const { type, id, userId } = state.pendingDeletion;

        if (type === 'user-records') {
            try {
                const invoicesToDelete = state.invoices.filter(i => i.targetUserId === userId); showToast("Deleting records... Please wait.");
                await Promise.all(invoicesToDelete.map(inv => fetch(`/api/invoices/${inv.id}`, { method: 'DELETE' })));
                state.invoices = state.invoices.filter(i => i.targetUserId !== userId); state.pendingDeletion = null; showToast("All user records deleted successfully");
                closeModal();
                if (state.currentPage === 'records') renderDashboard();
            } catch(e) { showToast("Error deleting records", true); } return;
        }

        if (type === 'record') {
            try {
                const response = await fetch(`/api/invoices/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    // NEW: Automatically refund deleted advances to the main invoice!
                    const deletedInv = state.invoices.find(i => i.id === id);
                    if (deletedInv && deletedInv.description && deletedInv.description.includes('(Advance)')) {
                        const mainInv = state.invoices.find(i => i.projectId === deletedInv.projectId && i.assignmentId === deletedInv.assignmentId && i.stage === deletedInv.stage && i.status === 'pending');
                        if (mainInv) {
                            const refundedAmount = parseFloat(mainInv.amount) + parseFloat(deletedInv.amount);
                            await fetch(`/api/invoices/${mainInv.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ amount: refundedAmount }) });
                            mainInv.amount = refundedAmount;
                        }
                    }

                    state.invoices = state.invoices.filter(i => i.id !== id);
                    state.pendingDeletion = null;
                    showToast("Record deleted");
                    closeModal();

                    // Seamlessly refresh the list without closing the window
                    if (state.currentPage === 'records') {
                        const listContainer = document.getElementById('invoice-list-container');
                        if (listContainer) listContainer.innerHTML = generateInvoiceListHtml();
                        const statsContainer = document.getElementById('invoice-summary-stats');
                        if (statsContainer) statsContainer.innerHTML = getFinancialStatsHtml();
                    }
                } else showToast("Failed to delete record from DB", true);
            } catch(e) { showToast("Server connection error", true); } return;
        }

        try {
            let endpoint = ''; if (type === 'project') endpoint = `/api/projects/${id}`; else if (type === 'assignment') endpoint = `/api/assignments/${id}`; else if (type === 'user') endpoint = `/api/users/${id}`;
            const response = await fetch(endpoint, { method: 'DELETE' });
            if (response.ok) {
                if (type === 'project') { state.projects = state.projects.filter(p => p.id !== id); state.assignments = state.assignments.filter(a => a.projectId !== id); syncLocalSnapshot(); if (state.currentProject === id) state.currentProject = state.projects.length > 0 ? state.projects[0].id : null; showToast(`Project deleted`); }
                else if (type === 'assignment') { state.assignments = state.assignments.filter(a => a.id !== id); syncLocalSnapshot(); showToast(`Assignment deleted`); }
                else if (type === 'user') { state.users = state.users.filter(u => u.id !== id); showToast(`User removed`); }
            } else { showToast("Failed to delete", true); }
        } catch(error) { showToast("Server error", true); }
        state.pendingDeletion = null; closeModal(); renderDashboard();
    }

window.downloadAllLatestShots = function() {
        let allMovieShots = state.assignments.filter(a => a.projectId === state.currentProject);
        let epShots = allMovieShots.filter(a => ((a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1') === state.selectedEpisode);
        epShots.sort((a, b) => window.getShotOrder(a) - window.getShotOrder(b));

        let filesToDownload = [];

        epShots.forEach((shot) => {
            if (shot.versions && shot.versions.length > 0) {
                // Get the absolute newest valid upload for this shot
                const latestV = shot.versions.find(v => !v.isRetake) || shot.versions[0];
                if (latestV && latestV.fileUrl) {
                    filesToDownload.push({ url: latestV.fileUrl, name: latestV.filename || `${shot.name}_latest` });
                }
            }
        });

        if (filesToDownload.length > 0) {
            showToast(`Preparing to download ${filesToDownload.length} latest shots...`);
            filesToDownload.forEach((f, index) => {
                setTimeout(() => {
                    downloadOrOpen(f.url, f.name);
                }, index * 800); // 800ms stagger so the browser doesn't block the popups
            });
        } else {
            showToast("No uploaded shots found in this episode.", true);
        }
    };

    function downloadInputData(assignmentId) {
        const assignment = state.assignments.find(a => a.id === assignmentId);
        if (!assignment || !assignment.inputData) return showToast("No input data found.", true);

        let filesToDownload = [];

        // Catch legacy string or link formats
        if (typeof assignment.inputData === 'string') {
            filesToDownload.push({ url: assignment.inputData, name: `${assignment.name}_Input` });
        } else if (assignment.inputData.link) {
            filesToDownload.push({ url: assignment.inputData.link, name: `${assignment.name}_Input` });
        } else {
            // Standard new JSON formats
            if (assignment.inputData.files && assignment.inputData.files.length > 0) {
                filesToDownload = [...assignment.inputData.files];
            } else if (assignment.inputData.url) {
                filesToDownload.push({ url: assignment.inputData.url, name: assignment.inputData.name || `${assignment.name}_Input_Data` });
            }

            if (assignment.inputData.startFrame) {
                filesToDownload.push({ url: assignment.inputData.startFrame, name: `${assignment.name}_Start_Frame` });
            }
            if (assignment.inputData.endFrame) {
                filesToDownload.push({ url: assignment.inputData.endFrame, name: `${assignment.name}_End_Frame` });
            }
        }

        if (filesToDownload.length > 0) {
            showToast(`Downloading ${filesToDownload.length} input files...`);
            filesToDownload.forEach((f, index) => {
                setTimeout(() => {
                    downloadOrOpen(f.url, f.name || `${assignment.name}_Input_${index + 1}`);
                }, index * 500); // 500ms stagger prevents browser popup blocking
            });
        } else {
            showToast("No input data found.", true);
        }
    }

    function getNextVersionName(assignment) {
        let total = assignment.versions ? assignment.versions.length : 0;
        if (assignment.completedLevels) {
            assignment.completedLevels.forEach(cl => {
                if (cl.versions) total += cl.versions.length;
            });
        }
        const nextNum = total + 1;
        return nextNum < 10 ? `v0${nextNum}` : `v${nextNum}`;
    }

    async function updateStatus(id, newStatus) {
        const idx = state.assignments.findIndex(a => a.id === id);
        if (idx > -1) {
            const a = state.assignments[idx];

            const oldStatus = a.status;
            const wasWorking = ['wip', 'retake'].includes(oldStatus);
            const isWorking = ['wip', 'retake'].includes(newStatus);

            // NEW: Get current stage name
            const currentStageName = (a.levels && a.levels.length > 0) ? a.levels[a.currentLevelIndex] : 'Final';

            if (wasWorking && !isWorking) {
                // Ensure data objects exist
                if (!a.inputData) a.inputData = {};
                if (!a.inputData.stageTimes) a.inputData.stageTimes = {};

                // Calculate active session time using the backup JSON timer
                const activeTimer = a.timerStartedAt || (a.inputData && a.inputData.timerStartedAt) || Date.now();
                const sessionTime = Math.max(0, Date.now() - activeTimer);

                // Add the elapsed time to THIS specific stage
                a.inputData.stageTimes[currentStageName] = (a.inputData.stageTimes[currentStageName] || 0) + sessionTime;

                // Also update legacy accumulated time for overall progress
                a.accumulatedTime = (a.accumulatedTime || 0) + sessionTime;

            } else if (!wasWorking && isWorking) {
                // CRITICAL: Always stamp the exact moment play is pressed
                a.timerStartedAt = Date.now();
                if (!a.inputData) a.inputData = {};
                a.inputData.timerStartedAt = a.timerStartedAt; // Save backup to JSON
                if (oldStatus === 'paused') showToast(`Work Started! Timer running...`);
            }

            if (newStatus === 'approved') {

                const isLastLevel = (a.levels && a.levels.length > 0) ? (a.currentLevelIndex >= a.levels.length - 1) : true;
                if (a.status !== 'approved') {
                    const latestVersion = a.versions.find(v => !v.isRetake) || a.versions[0];
                    if (!a.completedLevels) a.completedLevels = [];
                    const levelNameStr = (a.levels && a.levels.length > 0) ? a.levels[a.currentLevelIndex] : 'Final';

                    const existingIdx = a.completedLevels.findIndex(cl => cl.levelName === levelNameStr);
                    const completedData = { levelName: levelNameStr, finalFileUrl: latestVersion ? latestVersion.fileUrl : null, finalFilename: latestVersion ? latestVersion.filename : 'Approved File', finalVName: latestVersion ? latestVersion.vName : '', versions: [...a.versions] };

                    if (existingIdx > -1) { a.completedLevels[existingIdx] = completedData; }
                    else { a.completedLevels.push(completedData); }

                    if (!isLastLevel) {
                        a.currentLevelIndex++; a.status = 'paused'; a.assignedTo = null;
                        const nextLevelStr = a.levels[a.currentLevelIndex];
                        const nextExistingIdx = a.completedLevels.findIndex(cl => cl.levelName === nextLevelStr);
                        if (nextExistingIdx > -1) {
                            a.versions = JSON.parse(JSON.stringify(a.completedLevels[nextExistingIdx].versions));
                            a.completedLevels.splice(nextExistingIdx, 1);
                        } else { a.versions = []; }
                        showToast(`${levelNameStr} Approved! Moving to ${a.levels[a.currentLevelIndex]}`);
                    } else {
                        a.status = 'approved'; a.assignedTo = null; showToast(`Assignment fully approved! Timer stopped.`);
                    }
                }
            } else {
                a.status = newStatus; let displayStatus = newStatus; if (newStatus === 'uploaded' || newStatus === 'client_approved') displayStatus = 'published';
                if (newStatus === 'client_approved') { a.assignedTo = null; }
                if(newStatus !== 'wip') showToast(`Status changed to ${displayStatus.charAt(0).toUpperCase() + displayStatus.slice(1)}`);
            }

            // --- THE FIX: INSTANT OPTIMISTIC UI UPDATE ---
            syncLocalSnapshot();

            // Immediately update the screen without waiting for the server
            const container = document.getElementById('assignments-container');
            if (container) {
                container.innerHTML = renderAssignmentsList();
            } else {

    window.submitCroppedProfile = async function() {
        if (!window.cropperInstance) return;

        const btn = document.getElementById('crop-upload-btn');
        if(btn) { btn.disabled = true; btn.innerText = "Processing..."; }

        // Grab the exact 400x400 canvas
        const canvas = window.cropperInstance.getCroppedCanvas({
            width: 400, height: 400, imageSmoothingEnabled: true, imageSmoothingQuality: 'high'
        });

        if (!canvas) { showToast("Failed to crop image", true); closeModal(); return; }

        // Extract the visual preview immediately
        const dataUrl = canvas.toDataURL('image/png');

        canvas.toBlob(async (blob) => {
            if (!blob) { showToast("Failed to process image", true); return; }

            const fileName = state.tempCropFilename || 'cropped.png';
            let file;
            try { file = new File([blob], fileName, { type: 'image/png' }); }
            catch (e) { file = blob; file.name = fileName; }

            if (!state.activeCropType || state.activeCropType === 'profile') {
                showToast("Uploading profile picture...");
                if (state.currentUser.profilePic) {
                    try { await fetch('/api/file', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fileUrl: state.currentUser.profilePic }) }); } catch(err) {}
                }
                const customFileName = `${state.currentUser.name}_Profile_${Date.now()}.png`.replace(/\s+/g, '_');
                const formData = new FormData();
                formData.append('file', file, customFileName);
                formData.append('projectName', 'System');
                formData.append('assignmentName', 'Users');
                formData.append('folderType', 'Profiles');
                formData.append('customFileName', customFileName);

                try {
                    const uploadRes = await uploadWithProgress('/api/upload', formData, customFileName);
                    if (uploadRes.ok && uploadRes.data.success) {
                        state.currentUser.profilePic = uploadRes.data.fileUrl;
                        await fetch(`/api/users/${state.currentUser.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ profilePic: uploadRes.data.fileUrl }) });
                        renderDashboard(); showToast("Profile picture updated!");
                    } else { showToast("Failed to upload", true); }
                } catch(e) { showToast("Failed to upload", true); }
                closeModal();
            }
            else {
                const type = state.activeCropType;

                // Store the data safely into memory
                if (type === 'project') { state.tempProjectActualFile = file; state.tempProjectImg = dataUrl; }
                else if (type === 'assignment') { state.tempAssignmentActualFile = file; state.tempAssignmentImg = dataUrl; }
                else if (type === 'thumb') { state.tempUploadThumbFile = file; state.tempUploadThumbImg = dataUrl; }
                else if (type === 'retake-thumb') { state.tempRetakeThumbFile = file; state.tempRetakeThumbImg = dataUrl; }
                else if (type === 'episode') { state.tempEpisodeActualFile = file; state.tempEpisodeImg = dataUrl; }

                if (window.cropperInstance) {
                    window.cropperInstance.destroy();
                    window.cropperInstance = null;
                }

                // THE FIX: Swap the window back instantly without triggering openModal resets
                const container = document.getElementById('modal-container');
                container.dataset.modalType = state.previousModalType;
                renderModals();
            }
        }, 'image/png');
    };

    function formatCompanyExpiry(ms) {
        if (!ms) return 'No expiry';
        const d = new Date(Number(ms));
        if (isNaN(d.getTime())) return 'No expiry';
        return d.toLocaleDateString();
    }

    function companyDaysLabel(company) {
        if (!company) return 'Unknown';
        if (company.blocked || company.active === false) return 'Blocked';
        if (company.expired) return 'Expired';
        if (company.remainingDays === null || company.remainingDays === undefined) return 'No expiry';
        return company.remainingDays + ' day' + (Number(company.remainingDays) === 1 ? '' : 's') + ' left';
    }

    function companyBadgeClass(company) {
        if (!company || company.blocked || company.active === false) return 'bg-red-700/90 text-white border border-red-400';
        if (company.expired || company.subscriptionWarning === 'expired') return 'bg-red-600/80 text-white border border-red-400';
        if (company.subscriptionWarning === 'critical') return 'bg-orange-600/80 text-white border border-orange-400';
        if (company.subscriptionWarning === 'warning') return 'bg-yellow-500/90 text-black border border-yellow-300';
        return 'bg-green-600/70 text-white border border-green-400';
    }

    function companyUserSubscriptionLabel(user) {
        if (!user) return '';
        const remaining = user.companyRemainingDays;
        if (user.companyExpired || remaining === 0) return 'Expired';
        if (remaining === null || remaining === undefined) return 'No expiry';
        if (Number(remaining) <= 3) return remaining + ' days left - renew soon';
        if (Number(remaining) <= 7) return remaining + ' days left';
        return remaining + ' days left';
    }

    function companySubscriptionColorClass(warning) {
        if (warning === 'expired') return 'bg-red-700 text-white border-red-300';
        if (warning === 'critical') return 'bg-red-600 text-white border-red-300';
        if (warning === 'warning') return 'bg-yellow-500 text-black border-yellow-300';
        return 'bg-emerald-700 text-white border-emerald-400';
    }

    function renderCompanySubscriptionNavWidget() {
        const user = state.currentUser || {};
        const remaining = user.companyRemainingDays;
        const expires = formatCompanyExpiry(user.companyExpiresAt);
        const pct = Math.max(0, Math.min(100, Number(user.companySubscriptionPercent || 0)));
        const warning = user.companySubscriptionWarning || 'ok';
        const colorClass = companySubscriptionColorClass(user.companyExpired ? 'expired' : warning);
        const label = companyUserSubscriptionLabel(user);
        const companyName = escapeHTML(user.companyName || 'Company');
        const isOpen = !!state.subscriptionDetailsOpen;
        const daysText = (remaining === null || remaining === undefined) ? 'No expiry limit' : (remaining + ' day' + (Number(remaining) === 1 ? '' : 's') + ' remaining');
        const statusText = user.companyExpired ? 'Expired - access blocked' : (warning === 'critical' ? 'Renew soon' : (warning === 'warning' ? 'Ending soon' : 'Active'));
        return `
            <div id="company-subscription-nav" class="subscription-nav-wrap" onclick="event.stopPropagation()">
                <button onclick="toggleSubscriptionDetails(event)" class="subscription-nav-pill ${colorClass}" title="Click to view subscription details">

                    <div class="subscription-progress-track"><div class="subscription-progress-fill" style="width:${pct}%"></div></div>

                ${isOpen ? `
                    <div class="subscription-details-panel text-white">
                        <div class="flex items-center justify-between gap-3 mb-2">
                            <div class="min-w-0">
                                <div class="font-extrabold text-sm truncate">${companyName} Subscription</div>
                                <div class="text-xs text-gray-400 mt-0.5">${statusText}</div>
                            </div>
                            <button onclick="toggleSubscriptionDetails(event)" class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center shrink-0">×</button>
                        </div>
                        <div class="space-y-2 text-xs">
                            <div class="flex justify-between gap-3"><span class="text-gray-400">Remaining</span><span class="font-bold text-right">${daysText}</span></div>
                            <div class="flex justify-between gap-3"><span class="text-gray-400">Expiry date</span><span class="font-bold text-right">${expires}</span></div>
                            <div class="flex justify-between gap-3"><span class="text-gray-400">Used / left</span><span class="font-bold text-right">${pct}% remaining</span></div>
                        </div>
                        <div class="w-full h-2 bg-black/40 rounded-full overflow-hidden mt-3"><div class="h-full bg-white/85" style="width:${pct}%"></div></div>
                        ${(warning === 'critical' || warning === 'warning' || user.companyExpired) ? `<div class="mt-3 rounded-xl bg-black/25 border border-white/10 p-2 text-xs font-semibold">Please contact root admin before the subscription ends to avoid access block.</div>` : ''}

    function getDefaultCompanyExpiryDateInput() {
        const d = new Date(Date.now() + 30 * 24 * 60 * 60 * 1000);

    }

    function clampCompanyDays(value) {
        const n = parseInt(value, 10);
        if (isNaN(n)) return 30;
        return Math.max(1, Math.min(n, 3650));
    }

    function getCompanyExpiryDateFromDays(daysValue) {
        const days = clampCompanyDays(daysValue);
        const d = new Date(Date.now() + days * dayMs);
        return d.toISOString().slice(0, 10);
    }

    function updateCompanyExpiryPreview() {
        const input = document.getElementById('company-days');

        const previewMobile = document.getElementById('company-expiry-preview-mobile');
        const days = clampCompanyDays(input ? input.value : state.tempCompanyDays);
        const text = `Expires on ${getCompanyExpiryDateFromDays(days)} (${days} days from today)`;
        if (preview) preview.textContent = text;
        if (previewMobile) previewMobile.textContent = text;
    }

    function formatDateInputFromMs(ms) {
        if (!ms) return getDefaultCompanyExpiryDateInput();
        const d = new Date(Number(ms));
        if (isNaN(d.getTime())) return getDefaultCompanyExpiryDateInput();
        return d.toISOString().slice(0, 10);
    }

window.saveAssignmentStages = async function(assignmentId) {
    const input = document.getElementById('edit-stages-input').value;
    const newStages = input.split(',').map(s => s.trim()).filter(s => s);

    if (newStages.length === 0) return showToast("Must have at least one stage", true);

    const assignment = state.assignments.find(a => a.id === assignmentId);
    if (!assignment) return;

    assignment.levels = newStages;

    // Smart Indexing: Calculate how many stages are actually completed
    let completedCount = assignment.completedLevels ? assignment.completedLevels.length : 0;

    if (completedCount >= newStages.length) {
        // If they deleted stages so it is fully complete
        assignment.currentLevelIndex = newStages.length - 1;
        assignment.status = 'approved';
    } else {
        // There are still uncompleted stages (e.g., they added a new one)
        assignment.currentLevelIndex = completedCount;

        // Wake the assignment up if it was previously locked as approved
        if (assignment.status === 'approved') {
            assignment.status = 'paused';
        }
    }

    try {
        // Send the updated status and index directly to the database
        const res = await fetch(`/api/assignments/${assignmentId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                levels: newStages,
                currentLevelIndex: assignment.currentLevelIndex,
                status: assignment.status
            })
        });

        if (res.ok) {
            syncLocalSnapshot();
            renderDashboard();
            closeModal();
            showToast("Stages updated successfully!");
        } else {
            showToast("Failed to update stages", true);
        }
    } catch (e) {
        showToast("Server error", true);
    }
};

// --- PATCH: PERSIST EMPTY EPISODES LOCALLY ---

    // 1. Helper to combine Episodes from DB, Shots, and LocalStorage
    window.getProjectEpisodes = function(projectId) {
        const project = state.projects.find(p => p.id === projectId);
        if (!project) return ['Episode 1'];
        let allMovieShots = state.assignments.filter(a => a.projectId === projectId);
        let epFromShots = allMovieShots.map(a => (a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1');
        let epFromLocal = JSON.parse(localStorage.getItem('episodes_' + projectId) || '[]');
        let epFromDb = project.episodes || [];
        let combined = [...new Set([...epFromDb, ...epFromShots, ...epFromLocal])];
        if (combined.length === 0) combined = [];
        return combined;
    };

    // 2. Override the Add Episode function to save locally
    window.executeAddEpisode = async function() {
        const name = document.getElementById('new-episode-name').value.trim();
        if (!name) return showToast("Please enter an episode name", true);
        const project = state.projects.find(p => p.id === state.currentProject);

        const file = state.tempEpisodeActualFile;
        let finalThumbUrl = null;

        closeModal();
        showToast("Adding Episode... Please wait.");

        if (file) {
            const ext = getFileExtension(file.name);
            const customFileName = `${project.name}_${name}_Cover${ext}`.replace(/\s+/g, '_');
            const formData = new FormData(); formData.append('file', file); formData.append('projectName', project.name); formData.append('assignmentName', name); formData.append('folderType', 'Episode_Assets'); formData.append('customFileName', customFileName);
            try {
                const uploadRes = await uploadWithProgress('/api/upload', formData, customFileName);
                if (uploadRes.ok && uploadRes.data.success) { finalThumbUrl = uploadRes.data.fileUrl; }
            } catch(e) {}
        } else if (state.tempEpisodeImg) {
            finalThumbUrl = state.tempEpisodeImg;
        }

        if (!project.episodeThumbs) project.episodeThumbs = {};
        if (finalThumbUrl) project.episodeThumbs[name] = finalThumbUrl;

        // Save Locally to survive polling
        let localEpisodes = JSON.parse(localStorage.getItem('episodes_' + project.id) || '[]');
        if (!localEpisodes.includes(name)) { localEpisodes.push(name); localStorage.setItem('episodes_' + project.id, JSON.stringify(localEpisodes)); }

        let localThumbs = JSON.parse(localStorage.getItem('episodeThumbs_' + project.id) || '{}');
        if (finalThumbUrl) { localThumbs[name] = finalThumbUrl; localStorage.setItem('episodeThumbs_' + project.id, JSON.stringify(localThumbs)); }

        // Save to State
        let currentEpisodes = project.episodes || [];
        if (!currentEpisodes.includes(name)) currentEpisodes.push(name);
        project.episodes = currentEpisodes;

        try { await fetch('/api/projects/' + project.id, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ episodes: currentEpisodes, episodeThumbs: project.episodeThumbs }) }); } catch(e) {}

        state.selectedEpisode = name;
        showToast("Episode added!");
        renderDashboard();
    };

    // 3. Override the Delete Episode function to remove locally AND delete all shots
    window.executeDeleteEpisode = async function() {
        const epToDelete = state.pendingEpisodeDeletion;
        const project = state.projects.find(p => p.id === state.currentProject);

        showToast("Deleting episode and shots...");
        closeModal();

        // Find all shots belonging to this exact episode
        const shotsToDelete = state.assignments.filter(a => a.projectId === project.id && ((a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1') === epToDelete);

        // Loop through and delete every shot from the backend and our local state
        for (let shot of shotsToDelete) {
            try {
                await fetch(`/api/assignments/${shot.id}`, { method: 'DELETE' });
                state.assignments = state.assignments.filter(a => a.id !== shot.id);
            } catch(e) {
                console.error("Failed to delete shot:", shot.id);
            }
        }
        syncLocalSnapshot();

        // Remove Episode Locally
        let localEpisodes = JSON.parse(localStorage.getItem('episodes_' + project.id) || '[]');
        localEpisodes = localEpisodes.filter(e => e !== epToDelete);
        localStorage.setItem('episodes_' + project.id, JSON.stringify(localEpisodes));

        // Remove Episode from State
        let currentEpisodes = project.episodes || [];
        currentEpisodes = currentEpisodes.filter(e => e !== epToDelete);
        project.episodes = currentEpisodes;
        try { fetch('/api/projects/' + project.id, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ episodes: currentEpisodes }) }); } catch(e) {}

        // Reset the view if we are deleting the episode we are currently looking at
        if (state.selectedEpisode === epToDelete) {
            let combined = window.getProjectEpisodes(state.currentProject);
            state.selectedEpisode = combined.length > 0 ? combined[0] : null;
            state.selectedAiShot = null;
        }

        showToast("Episode and shots deleted!");
        renderDashboard();
    };

    // 4. Intercept Dashboard render to force it to use local episodes
    const originalRenderAiMovieDashboard = renderAiMovieDashboard;
    renderAiMovieDashboard = function() {
        const project = state.projects.find(p => p.id === state.currentProject);
        if (project) {
            project.episodes = window.getProjectEpisodes(state.currentProject);
            if (!state.selectedEpisode || !project.episodes.includes(state.selectedEpisode)) {
                state.selectedEpisode = project.episodes[0];
            }
        }
        originalRenderAiMovieDashboard();
    };

    // 5. Intercept Modal opening to add empty episodes to the "Add Shot" dropdown
    const originalOpenModal = openModal;
    openModal = function(type) {
        originalOpenModal(type);
        if (type === 'assignment') {
            setTimeout(() => {
                const epSelect = document.getElementById('new-shot-episode');
                if (epSelect) {
                    const combinedEpisodes = window.getProjectEpisodes(state.currentProject);
                    epSelect.innerHTML = combinedEpisodes.map(ep => '<option value="' + ep + '" ' + (state.selectedEpisode === ep ? 'selected' : '') + '>' + ep + '</option>').join('');
                }
            }, 50);
        }
    };


// --- D3 PIPELINE ENGINE ---
    function initD3Editor(containerSelector, initialData) {
        const containerEl = document.querySelector(containerSelector);
        if (!containerEl) return null;

        // Make the container focusable to capture keyboard events
        containerEl.tabIndex = 0;
        containerEl.style.outline = "none";

        const editorState = {
            nodes: initialData.stages || [],
            edges: initialData.dependencies || [],
            connectingFrom: null,
            selectedNode: null, // Tracks selected node for deletion
            selectedEdge: null, // Tracks selected line for deletion
            nodeWidth: 140,
            nodeHeight: 36
        };

        // KEYBOARD EVENT LISTENER: Delete selected items
        containerEl.onkeydown = (e) => {
            if (e.key === "Delete" || e.key === "Backspace") {
                if (editorState.selectedNode) {
                    e.preventDefault(); // Prevent browser from navigating back
                    editorState.nodes = editorState.nodes.filter(n => n.id !== editorState.selectedNode);
                    editorState.edges = editorState.edges.filter(ed => ed.from !== editorState.selectedNode && ed.to !== editorState.selectedNode);
                    editorState.selectedNode = null;
                    renderGraph();
                } else if (editorState.selectedEdge) {
                    e.preventDefault();
                    const [from, to] = editorState.selectedEdge.split("-");
                    editorState.edges = editorState.edges.filter(ed => !(ed.from === from && ed.to === to));
                    editorState.selectedEdge = null;
                    renderGraph();
                }
            }
        };

        containerEl.innerHTML = '';
        const svg = d3.select(containerSelector).append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .style("display", "block");

        // Click on the empty background to deselect everything
        svg.on("click", () => {
            editorState.selectedNode = null;
            editorState.selectedEdge = null;
            renderGraph();
        });

        const mainGroup = svg.append("g");
        const edgeLayer = mainGroup.append("g").attr("class", "edges");
        const tempEdgeLayer = mainGroup.append("g").attr("class", "temp-edges");
        const nodeLayer = mainGroup.append("g").attr("class", "nodes");

        const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e) => mainGroup.attr("transform", e.transform));
        svg.call(zoom);

        if (editorState.nodes.length > 0) {
            svg.call(zoom.transform, d3.zoomIdentity.translate(0, 50).scale(0.8));
        }

        function renderGraph() {
            // RENDER EDGES
            const edgeSelection = edgeLayer.selectAll("path.edge-line").data(editorState.edges, d => d.from + "-" + d.to);
            const edgeEnter = edgeSelection.enter().append("path")
                .attr("class", "edge-line")
                .attr("fill", "none")
                .attr("stroke-width", "3px")
                .style("cursor", "pointer")
                .on("mouseover", function(e, d) { if(editorState.selectedEdge !== (d.from+"-"+d.to)) d3.select(this).attr("stroke", "#ef4444"); })
                .on("mouseout", function(e, d) { if(editorState.selectedEdge !== (d.from+"-"+d.to)) d3.select(this).attr("stroke", "#555"); })
                .on("click", (e, d) => {
                    e.stopPropagation();
                    editorState.selectedEdge = d.from + "-" + d.to;
                    editorState.selectedNode = null;
                    containerEl.focus(); // Focus window to catch keyboard delete
                    renderGraph();
                });

            const allEdges = edgeSelection.merge(edgeEnter);
            // Highlight selected edge yellow
            allEdges.attr("stroke", d => editorState.selectedEdge === (d.from + "-" + d.to) ? "#f59e0b" : "#555")
                .attr("d", d => {
                    const fn = editorState.nodes.find(n => n.id === d.from); const tn = editorState.nodes.find(n => n.id === d.to);
                    if(!fn || !tn) return "";
                    const x1 = fn.x + editorState.nodeWidth; const y1 = fn.y + (editorState.nodeHeight/2); const x2 = tn.x; const y2 = tn.y + (editorState.nodeHeight/2); const cp = Math.abs(x2 - x1) * 0.5;
                    return `M ${x1},${y1} C ${x1 + cp},${y1} ${x2 - cp},${y2} ${x2},${y2}`;
                });
            edgeSelection.exit().remove();

            // RENDER NODES
            const nodeSelection = nodeLayer.selectAll("g.node-group").data(editorState.nodes, d => d.id);
            const nodeEnter = nodeSelection.enter().append("g").attr("class", "node-group")
                .on("click", (e, d) => {
                    e.stopPropagation();
                    editorState.selectedNode = d.id;
                    editorState.selectedEdge = null;
                    containerEl.focus(); // Focus window to catch keyboard delete
                    renderGraph();
                })
                .call(d3.drag()
                    .on("start", function() { d3.select(this).raise(); })
                    .on("drag", function(event, d) { d.x += event.dx; d.y += event.dy; d3.select(this).attr("transform", `translate(${d.x},${d.y})`); renderGraph(); }));

            nodeEnter.append("rect").attr("width", editorState.nodeWidth).attr("height", editorState.nodeHeight).attr("fill", "#333").attr("stroke-width", "2px").attr("rx", 6)
                .on("mouseover", function(e, d) { if(editorState.selectedNode !== d.id) d3.select(this).attr("stroke", "#3b82f6"); })
                .on("mouseout", function(e, d) { if(editorState.selectedNode !== d.id) d3.select(this).attr("stroke", "#555"); });

            nodeEnter.append("text").attr("x", editorState.nodeWidth / 2).attr("y", editorState.nodeHeight / 2 + 4).attr("fill", "#e5e7eb").attr("font-size", "12px").attr("font-weight", "bold").attr("text-anchor", "middle").style("pointer-events", "none").text(d => d.name);

            // Input Port (Green) - Mobile Optimized
            nodeEnter.append("circle").attr("cx", 0).attr("cy", editorState.nodeHeight / 2).attr("r", 12).attr("fill", "#10b981").attr("stroke", "#222").attr("stroke-width", "2px")
                .on("pointerup touchend", (e, d) => {
                    e.stopPropagation();
                    if(editorState.connectingFrom && editorState.connectingFrom !== d.id) {
                        const exists = editorState.edges.find(ed => ed.from === editorState.connectingFrom && ed.to === d.id); const reverse = editorState.edges.find(ed => ed.from === d.id && ed.to === editorState.connectingFrom);
                        if(!exists && !reverse) { editorState.edges.push({from: editorState.connectingFrom, to: d.id}); }
                    }
                    cleanupConnection();
                });

            // Output Port (Blue) with Magnetic Snapping - Mobile Optimized
            nodeEnter.append("circle").attr("cx", editorState.nodeWidth).attr("cy", editorState.nodeHeight / 2).attr("r", 12).attr("fill", "#3b82f6").attr("stroke", "#222").attr("stroke-width", "2px").style("cursor", "crosshair")
                .on("pointerdown touchstart", (e, d) => {
                    e.stopPropagation();
                    if(e.type === 'touchstart') { e.preventDefault(); } // VERY IMPORTANT: Stops mobile screen from panning while drawing wire
                    editorState.connectingFrom = d.id;
                    svg.on("pointermove touchmove", (event) => {
                        const coords = d3.pointer(event, mainGroup.node()); const fn = editorState.nodes.find(n => n.id === editorState.connectingFrom); if(!fn) return;
                        const x1 = fn.x + editorState.nodeWidth; const y1 = fn.y + (editorState.nodeHeight/2);
                        let targetX = coords[0]; let targetY = coords[1]; let isSnapped = false;

                        editorState.nodes.forEach(n => {
                            if (n.id !== editorState.connectingFrom) {
                                const px = n.x; const py = n.y + (editorState.nodeHeight / 2);
                                if (Math.hypot(px - coords[0], py - coords[1]) < 65) { targetX = px; targetY = py; isSnapped = true; } // Increased snap radius
                            }
                        });

                        const cp = Math.abs(targetX - x1) * 0.5; const pData = `M ${x1},${y1} C ${x1 + cp},${y1} ${targetX - cp},${targetY} ${targetX},${targetY}`;
                        let tLine = tempEdgeLayer.select("path"); if(tLine.empty()) tLine = tempEdgeLayer.append("path").attr("fill", "none").attr("stroke-width", "4px").style("pointer-events", "none");
                        tLine.attr("d", pData).style("stroke-dasharray", isSnapped ? "none" : "5,5").attr("stroke", isSnapped ? "#10b981" : "#3b82f6");
                    });
                    svg.on("pointerup touchend", (event) => {
                        const coords = d3.pointer(event, mainGroup.node()); let snappedNode = null;
                        editorState.nodes.forEach(n => {
                            if (n.id !== editorState.connectingFrom) {
                                const px = n.x; const py = n.y + (editorState.nodeHeight / 2);
                                if (Math.hypot(px - coords[0], py - coords[1]) < 65) { snappedNode = n; } // Increased snap radius
                            }
                        });
                        if (snappedNode) {
                            const exists = editorState.edges.find(ed => ed.from === editorState.connectingFrom && ed.to === snappedNode.id); const reverse = editorState.edges.find(ed => ed.from === snappedNode.id && ed.to === editorState.connectingFrom);
                            if(!exists && !reverse) { editorState.edges.push({from: editorState.connectingFrom, to: snappedNode.id}); }
                        }
                        cleanupConnection();
                    });
                });

            const allNodes = nodeSelection.merge(nodeEnter);
            allNodes.attr("transform", d => `translate(${d.x},${d.y})`);

            // Highlight selected node yellow
            allNodes.select("rect").attr("stroke", d => editorState.selectedNode === d.id ? "#f59e0b" : "#555");

            nodeSelection.exit().remove();
        }

        function cleanupConnection() { editorState.connectingFrom = null; tempEdgeLayer.selectAll("path").remove(); svg.on("mousemove touchmove pointermove", null).on("mouseup touchend pointerup", null); renderGraph(); }

        renderGraph();

        return {
            getData: () => ({ stages: editorState.nodes, dependencies: editorState.edges }),
            addNode: () => {
                const name = prompt("Enter stage name:");
                if(name && name.trim() !== '') {
                    const transform = d3.zoomTransform(svg.node());
                    const cx = ((containerEl.clientWidth || 400) / 2 - transform.x) / transform.k;
                    const cy = ((containerEl.clientHeight || 400) / 2 - transform.y) / transform.k;
                    const rx = cx + (Math.random() * 40 - 20) - (editorState.nodeWidth / 2);
                    const ry = cy + (Math.random() * 40 - 20) - (editorState.nodeHeight / 2);
                    editorState.nodes.push({ id: 'n'+Date.now(), name: name.trim(), x: rx, y: ry });
                    renderGraph();
                }
            },
            // NEW: Instantly adds a node without a prompt
            addSpecificNode: (name) => {
                if(name) {
                    const transform = d3.zoomTransform(svg.node());
                    const cx = ((containerEl.clientWidth || 400) / 2 - transform.x) / transform.k;
                    const cy = ((containerEl.clientHeight || 400) / 2 - transform.y) / transform.k;
                    const rx = cx + (Math.random() * 40 - 20) - (editorState.nodeWidth / 2);
                    const ry = cy + (Math.random() * 40 - 20) - (editorState.nodeHeight / 2);
                    editorState.nodes.push({ id: 'n'+Date.now() + Math.floor(Math.random()*100), name: name, x: rx, y: ry });
                    renderGraph();
                }
            },
            deleteSelected: () => {
                if (editorState.selectedNode) {
                    // Delete node and all connected lines
                    editorState.nodes = editorState.nodes.filter(n => n.id !== editorState.selectedNode);
                    editorState.edges = editorState.edges.filter(ed => ed.from !== editorState.selectedNode && ed.to !== editorState.selectedNode);
                    editorState.selectedNode = null;
                    renderGraph();
                } else if (editorState.selectedEdge) {
                    // Delete just the selected connecting line
                    const [from, to] = editorState.selectedEdge.split("-");
                    editorState.edges = editorState.edges.filter(ed => !(ed.from === from && ed.to === to));
                    editorState.selectedEdge = null;
                    renderGraph();
                } else {
                    showToast("Please tap a node or connecting line first to select it.", true);
                }
            },
            clearEdges: () => { editorState.edges = []; renderGraph(); },
            resetLayout: () => {
                let startX = 50;
                let startY = 100;
                editorState.nodes.forEach((node, i) => {
                    node.x = startX + ((i % 4) * 220); // 4 columns wide
                    node.y = startY + (Math.floor(i / 4) * 100);
                });
                svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(0, 0).scale(1));
                renderGraph();
            }
        };
    }

    // --- STAGE MANDAYS TOGGLE LOGIC ---
window.activeStageMandays = {};

window.toggleStageMandays = function(assignmentId, stageName, stageMandays, elapsedDays, totalMandays, lastWorker = '') {
    const displaySpan = document.getElementById(`mandays-text-${assignmentId}`);
    const pillSpan = document.getElementById(`mandays-display-${assignmentId}`);
    const progressText = document.getElementById(`progress-text-${assignmentId}`);
    const progressFill = document.getElementById(`progress-fill-${assignmentId}`);

    if (!displaySpan) return;

    const a = state.assignments.find(x => x.id === assignmentId);

    // Reset all stage buttons (remove the selection ring)
    const allStageBtns = document.querySelectorAll(`[id^="stage-btn-${assignmentId}-"]`);
    allStageBtns.forEach(btn => {
        btn.classList.remove('ring-2', 'ring-purple-400', 'ring-offset-1', 'ring-offset-[#3a3a3a]');
    });

    // Toggle logic
        if (window.activeStageMandays[assignmentId] === stageName) {
            // Turning OFF: Revert to Total / Active Stage Default
            window.activeStageMandays[assignmentId] = null;

            // Recalculate live consumed days so it restores correctly
            let totalConsumedDays = "0.0";
            if (a) {
                let totalElapsedMs = a.accumulatedTime || 0;
                if (['wip', 'retake'].includes(a.status)) {
                    const activeTimer = a.timerStartedAt || (a.inputData && a.inputData.timerStartedAt) || Date.now();
                    totalElapsedMs += Math.max(0, Date.now() - activeTimer);
                }
                totalConsumedDays = (totalElapsedMs / (1000 * 60 * 60 * 24)).toFixed(1);
            }

            displaySpan.innerHTML = `${totalConsumedDays}d / ${totalMandays}d Total`;
            pillSpan.className = "flex items-center gap-1 text-blue-300 bg-blue-900/20 backdrop-blur-md border border-blue-700/50 px-1.5 py-0.5 rounded shadow-sm font-bold tracking-wide transition-all mt-1 w-fit text-[9px]";

        if (a && progressText && progressFill) {
            const currentStageName = (a.levels && a.levels.length > 0) ? a.levels[a.currentLevelIndex] : 'Final';
            let defMandays = (a.inputData && a.inputData.stageMandays && a.inputData.stageMandays[currentStageName]) ? a.inputData.stageMandays[currentStageName] : a.mandays;
            if (defMandays) {
                let elapsedMs = (a.inputData && a.inputData.stageTimes && a.inputData.stageTimes[currentStageName]) ? a.inputData.stageTimes[currentStageName] : (a.accumulatedTime || 0);
                const activeTimer = a.timerStartedAt || (a.inputData && a.inputData.timerStartedAt) || Date.now();
                if (['wip', 'retake'].includes(a.status)) { elapsedMs += Math.max(0, Date.now() - activeTimer); }
                const defElapsed = elapsedMs / (1000 * 60 * 60 * 24);
                const pct = Math.min(100, (defElapsed / defMandays) * 100);
                const isOverdue = defElapsed > defMandays && a.status !== 'approved';
                let barColor = isOverdue ? 'bg-red-500' : 'bg-blue-500';
                if (a.status === 'approved' || (a.completedLevels && a.completedLevels.some(cl => cl.levelName === currentStageName))) barColor = 'bg-green-500';

                progressText.innerHTML = `<span class="${isOverdue ? 'text-red-400 font-bold' : ''}">${defElapsed.toFixed(1)}d</span><span>${defMandays}d</span>`;
                progressFill.className = `${barColor} h-full transition-all duration-500`;
                progressFill.style.width = `${pct}%`;
            }
        }
    } else {
        // Turning ON: Show Artist Specific Data Only
        window.activeStageMandays[assignmentId] = stageName;

        let workerHtml = lastWorker ? `<span class="text-white font-normal ml-1 flex items-center gap-1"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg> ${lastWorker}</span>` : '<span class="text-gray-400 italic ml-1">Unassigned</span>';

        displaySpan.innerHTML = `<span class="uppercase">${stageName}</span>: ${workerHtml}`;

        // Add the selection ring to the clicked button
        const clickedBtn = document.getElementById(`stage-btn-${assignmentId}-${stageName}`);
        if (clickedBtn) clickedBtn.classList.add('ring-2', 'ring-purple-400', 'ring-offset-1', 'ring-offset-[#3a3a3a]');

        // Change pill color to purple
        pillSpan.className = "flex items-center gap-1 text-purple-300 bg-purple-900/20 backdrop-blur-md border border-purple-700/50 px-1.5 py-0.5 rounded shadow-sm font-bold tracking-wide transition-all mt-1 w-fit text-[9px]";

        // Update progress bar dynamically
        if (a && progressText && progressFill) {
            const pct = stageMandays > 0 ? Math.min(100, (elapsedDays / stageMandays) * 100) : 0;
            const isCompleted = a.completedLevels && a.completedLevels.some(cl => cl.levelName === stageName);
            const isCurrentAndApproved = (stageName === ((a.levels && a.levels.length > 0) ? a.levels[a.currentLevelIndex] : 'Final')) && a.status === 'approved';
            const isOverdue = elapsedDays > stageMandays && stageMandays > 0 && !isCompleted && !isCurrentAndApproved;

            let barColor = isOverdue ? 'bg-red-500' : 'bg-purple-500';
            if (isCompleted || isCurrentAndApproved) barColor = 'bg-green-500';

            progressText.innerHTML = `<span class="${isOverdue ? 'text-red-400 font-bold' : ''}">${parseFloat(elapsedDays).toFixed(1)}d</span><span>${stageMandays}d</span>`;
            progressFill.className = `${barColor} h-full transition-all duration-500`;
            progressFill.style.width = `${pct}%`;
        }
    }
};

window.executeAddPipelineStage = function() {
        const input = document.getElementById('new-stage-name-input');
        if (input && input.value.trim() !== '') {
            if (window.d3Editor) {
                window.d3Editor.addSpecificNode(input.value.trim());

                // Re-open the pipeline modal instantly so you can keep working
                const container = document.getElementById('modal-container');
                container.dataset.modalType = 'project-stages';
                renderModals();
            }
        } else {
            showToast("Please enter a stage name.", true);
        }
    };

</script>
</body>
</html>
