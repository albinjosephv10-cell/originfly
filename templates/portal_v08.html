<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelance Portal Production</title>
    <!-- Fixed v6: secure session identity prevents deleted accounts from becoming new accounts -->
    <!-- Fixed v14: company manual expiry date + subscription indication bar -->
    <!-- Fixed v20: improved mobile dashboard spacing, cards, bottom nav, and touch targets -->
    <!-- Fixed v24: subscription warning changed to compact notification bar with click-to-expand details -->
    <!-- fixed_v1: duplicate Tailwind include removed; backend security fixes are in app_fixed_v1.py -->
    <link rel="apple-touch-icon" sizes="180x180" href="/static/logo.png?v=2">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #2d2d2d; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        body { background-color: #383838; color: #ffffff; font-family: sans-serif; overflow: hidden; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .company-date-picker { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }


        /* Fixed v24: Compact company subscription notification bar */
        .subscription-nav-wrap { position: relative; flex-shrink: 0; }
        .subscription-nav-pill {
            min-width: 180px;
            max-width: 260px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 3px;
            padding: 6px 10px;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(0,0,0,.28);
            border: 1px solid rgba(255,255,255,.18);
            user-select: none;
        }
        .subscription-nav-title { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 11px; font-weight: 800; line-height: 1; white-space: nowrap; }
        .subscription-nav-title span:first-child { overflow: hidden; text-overflow: ellipsis; }
        .subscription-progress-track { width: 100%; height: 4px; border-radius: 999px; background: rgba(0,0,0,.35); overflow: hidden; }
        .subscription-progress-fill { height: 100%; border-radius: 999px; background: rgba(255,255,255,.85); }
        .subscription-details-panel {
            position: absolute;
            right: 0;
            top: calc(100% + 8px);
            width: min(330px, calc(100vw - 24px));
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,.18);
            background: rgba(38,38,38,.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 45px rgba(0,0,0,.45);
            padding: 12px;
            z-index: 95;
        }
        .subscription-mobile-row {
            flex-shrink: 0;
            width: 100%;
            padding: 8px 12px;
            border-bottom: 1px solid rgba(156,163,175,.22);
            background: #323232;
        }
        .subscription-mobile-row .subscription-nav-wrap { width: 100%; }
        .subscription-mobile-row .subscription-nav-pill { width: 100%; max-width: none; min-width: 0; height: auto; min-height: 44px; }
        .subscription-mobile-row .subscription-details-panel { position: static; width: 100%; margin-top: 8px; box-shadow: none; }
        @media (max-width: 760px) {
            .subscription-nav-pill { min-width: 0; max-width: none; }
            .subscription-nav-title { font-size: 11px; }
        }

        @keyframes bell-ring {
            0%, 20%, 100% { transform: rotate(0deg); }
            5% { transform: rotate(25deg); }
            10% { transform: rotate(-20deg); }
            15% { transform: rotate(10deg); }
        }
        .animate-bell {
            animation: bell-ring 2.5s ease-in-out infinite;
            transform-origin: top center;
        }
        .mobile-bottom-nav {
            justify-content: space-evenly !important;
            gap: 0 !important;
            overflow-x: hidden !important;
            padding-left: 4px !important;
            padding-right: 4px !important;
        }
        .mobile-bottom-nav > button {
            flex: 1 1 0 !important;
            min-width: 0 !important;
            height: 100%;
            justify-content: center;
        }
        .mobile-bottom-nav > button span {
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (max-width: 380px) {
            .mobile-bottom-nav > button span { font-size: 9px; }
            .mobile-bottom-nav svg { width: 20px; height: 20px; }
        }


        /* Fixed v20: Mobile UI optimization */
        :root { --mobile-nav-h: 76px; }
        @media (max-width: 1299px) {
            html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
            body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
            #app { height: 100dvh; width: 100vw; overflow: hidden; }
            #toast-container { bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom) + 10px) !important; right: 10px !important; left: 10px !important; align-items: stretch !important; }
            #transfer-container { bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom) + 10px) !important; left: 10px !important; width: calc(100vw - 20px) !important; }
            .mobile-shell { height: 100dvh !important; padding-bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom)) !important; background: #2b2b2b; }
            .mobile-topbar { min-height: 58px; padding: 10px 12px !important; gap: 8px; }
            .mobile-topbar .mobile-user-name { max-width: 42vw; }
            .mobile-project-strip { padding: 10px 12px 12px !important; gap: 10px !important; scroll-snap-type: x proximity; }
            .mobile-project-card { width: 58px !important; scroll-snap-align: start; }
            .mobile-project-thumb { width: 54px !important; height: 54px !important; border-radius: 14px !important; }
            .mobile-add-project { width: 54px !important; height: 54px !important; border-radius: 14px !important; }
            .mobile-filterbar { padding: 10px 12px !important; gap: 8px !important; display: grid !important; grid-template-columns: minmax(110px, .85fr) minmax(0, 1.15fr); }
            .mobile-filterbar select, .mobile-filterbar input { width: 100% !important; max-width: none !important; height: 38px; border-radius: 10px !important; font-size: 13px !important; }
            .mobile-content { padding: 10px 10px 12px !important; }
            .mobile-add-assignment { height: 44px; border-radius: 12px !important; position: sticky; top: 0; z-index: 10; background: #3b3b3b !important; }
            .mobile-assignment-card { border-radius: 16px !important; margin-bottom: 12px !important; overflow: hidden; box-shadow: 0 4px 12px rgba(0,0,0,.22); }
            .mobile-assignment-header { padding: 10px !important; gap: 10px; }
            .mobile-assignment-thumb { width: 56px !important; height: 56px !important; border-radius: 12px !important; }
            .mobile-assignment-title { font-size: 15px !important; line-height: 1.2 !important; max-width: 48vw; }
            .mobile-assignment-body { padding: 10px !important; gap: 10px !important; }
            .mobile-action-row { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px !important; overflow-x: visible !important; }
            .mobile-action-row > button, .mobile-action-row > div { width: 100% !important; min-height: 38px; padding: 8px 10px !important; border-radius: 10px !important; font-size: 11px !important; justify-content: center; margin-right: 0 !important; }
            .mobile-bottom-nav { height: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom)) !important; padding: 6px 6px calc(6px + env(safe-area-inset-bottom)) !important; align-items: stretch !important; background: rgba(31,31,31,.98) !important; backdrop-filter: blur(14px); border-top: 1px solid rgba(255,255,255,.08) !important; }
            .mobile-bottom-nav > button { border-radius: 14px; min-height: 58px; padding: 5px 2px !important; color: #a9b0bb; }
            .mobile-bottom-nav > button:active { transform: scale(.96); background: rgba(255,255,255,.06); }
            .mobile-bottom-nav > button svg { width: 22px !important; height: 22px !important; margin-bottom: 2px; }
            .mobile-bottom-nav > button span { font-size: 10px !important; line-height: 1.1; }
            .mobile-bottom-nav .mobile-nav-active { color: #60a5fa !important; background: rgba(59,130,246,.12); }
            .mobile-page-shell { height: 100dvh !important; max-height: 100dvh !important; padding: 14px !important; border-radius: 0 !important; }
            .mobile-page-header { position: sticky; top: 0; z-index: 20; background: #383838; margin: -14px -14px 12px !important; padding: 14px 48px 12px 14px !important; }
            .mobile-page-scroll { padding-bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom) + 20px); }

            /* Fixed v22: Better mobile Companies page and compact company controls */
            .company-page-shell { padding: 0 !important; overflow: hidden; }
            .company-page-header { position: sticky; top: 0; z-index: 50; display: grid; grid-template-columns: auto minmax(0, 1fr) auto; gap: 10px; align-items: center; background: #383838; padding: calc(10px + env(safe-area-inset-top)) 12px 12px; border-bottom: 1px solid rgba(156,163,175,.28); box-shadow: 0 6px 16px rgba(0,0,0,.18); }
            .company-page-title h2 { font-size: 20px !important; line-height: 1.15; }
            .company-page-title p { display: none; }
            .company-back-btn, .company-close-btn { min-width: 44px; height: 44px; border-radius: 14px; border: 1px solid rgba(156,163,175,.32); background: rgba(17,17,17,.55); color: white; display: flex; align-items: center; justify-content: center; }
            .company-back-btn span { display: none; }
            .company-content-wrap { padding: 12px; overflow-y: auto; flex: 1; padding-bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom) + 18px); }
            .company-add-form { border-radius: 18px !important; padding: 14px !important; margin-bottom: 14px !important; }
            .company-add-grid { display: grid !important; grid-template-columns: 1fr !important; gap: 10px !important; }
            .company-form-input { height: 48px !important; border-radius: 14px !important; font-size: 15px !important; padding-left: 12px !important; padding-right: 12px !important; }
            .company-submit-btn { height: 50px !important; border-radius: 14px !important; font-size: 15px !important; }
            .company-add-open-btn { width: 100%; min-height: 50px; }
            .company-small-close-btn { display: flex; align-items: center; justify-content: center; font-size: 20px; }
            .company-card { border-radius: 18px !important; padding: 14px !important; gap: 12px !important; }
            .company-card-actions { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)) !important; gap: 8px !important; width: 100%; }
            .company-card-actions button { width: 100% !important; min-height: 42px !important; border-radius: 12px !important; padding: 8px 6px !important; font-size: 11px !important; }
            .company-expiry-preview { display: block !important; border-radius: 12px !important; }
            input, select, textarea, button { font-size: 16px; }
        }
        @media (max-width: 390px) {
            .mobile-bottom-nav > button span { font-size: 9px !important; }
            .mobile-bottom-nav > button svg { width: 20px !important; height: 20px !important; }
            .mobile-assignment-title { max-width: 42vw; }
        }

        @media (min-width: 1300px) {
            .company-page-shell { padding: 0 !important; }
            .company-page-header { display: flex; align-items: center; gap: 14px; background: #383838; padding: 22px 28px; border-bottom: 1px solid rgba(156,163,175,.25); }
            .company-page-title { flex: 1; }
            .company-back-btn { min-width: 42px; height: 42px; padding: 0 14px; gap: 8px; border-radius: 12px; border: 1px solid rgba(156,163,175,.32); background: #2d2d2d; color: #d1d5db; display: flex; align-items: center; justify-content: center; }
            .company-back-btn span { display: inline; font-size: 13px; font-weight: 700; }
            .company-close-btn { min-width: 42px; height: 42px; border-radius: 999px; border: 1px solid rgba(156,163,175,.32); background: #2d2d2d; color: #d1d5db; display: flex; align-items: center; justify-content: center; font-size: 20px; }
            .company-content-wrap { padding: 22px 28px; overflow-y: auto; flex: 1; }
            .company-add-grid { display: grid !important; grid-template-columns: 1fr 1fr 1fr 160px 180px !important; gap: 14px !important; align-items: end; }
            .company-add-open-btn { width: auto; min-width: 180px; }
            .company-card-actions { display: flex !important; flex-direction: row; flex-wrap: wrap; gap: 8px !important; width: auto; justify-content: flex-end; }
            .company-card-actions button { width: auto !important; min-height: 34px !important; font-size: 12px !important; padding: 7px 12px !important; }
        }

        @media (max-width: 340px) {
            .mobile-bottom-nav > button span { display: none; }
            .mobile-bottom-nav > button svg { margin-bottom: 0; }
            .mobile-bottom-nav > button { min-height: 52px; }
            :root { --mobile-nav-h: 64px; }
        }
    </style>
</head>

<body class="h-screen w-full flex flex-col relative overflow-hidden bg-[#383838]">

    <div id="app" class="h-full w-full flex overflow-hidden"></div>
    <div id="modal-container" class="fixed inset-0 z-50 bg-black/40 hidden items-center justify-center p-4"></div>

    <div id="image-viewer-modal" class="fixed inset-0 z-[60] bg-black/95 hidden items-center justify-center p-4 cursor-pointer" onclick="closeImagePreview()">
        <img id="expanded-image" class="max-w-full max-h-full object-contain cursor-default" onclick="event.stopPropagation()">
        <button class="absolute top-4 right-4 text-white hover:text-gray-300 text-3xl font-bold bg-black/50 w-10 h-10 rounded-full flex items-center justify-center z-50" onclick="closeImagePreview()">&times;</button>
    </div>

    <div id="toast-container" class="fixed bottom-4 right-4 z-[70] space-y-2 pointer-events-none flex flex-col items-end"></div>
    <div id="transfer-container" class="fixed bottom-4 left-4 z-[70] space-y-2 pointer-events-none flex flex-col w-64 md:w-80"></div>
    <input type="file" id="profile-upload-input" class="hidden" accept="image/*" onchange="handleProfileUpload(event)">
    <input type="file" id="wallpaper-upload-input" class="hidden" accept="image/jpeg, image/png, image/webp" onchange="handleWallpaperUpload(event)">

<script>
    const now = Date.now();
    const dayMs = 24 * 60 * 60 * 1000;

    const state = {
        currentUser: null, activeTab: 'user', currentProject: null, selectedAiShot: null, insertAfterShotId: null,
        selectedEpisode: 'Episode 1', tempShotNumber: '', playbackMode: 'single', isLooping: false, isMuted: false,
        searchQuery: '', sortBy: 'all', expandedAssignments: [], expandedStages: [], profileMenuOpen: false,
        tempProjectImg: null, tempProjectName: '', tempAssignmentImg: null, tempAssignmentInputUrl: null,
        tempAssignmentInputName: null, tempAssignmentName: '', tempAssignmentMandays: '', tempAssignmentLevels: '',
        tempAssignmentAssignee: '', tempStartFrame: '', tempEndFrame: '', pendingDeletion: null, pendingVersionDeletion: null, pendingEpisodeDeletion: null,
        uploadingAssignmentId: null, tempRetakeFileUrl: null, tempRetakeFileName: null, tempRetakeNote: '',
        tempTeamUserName: '', tempTeamRole: 'client', selectedUserName: '', users: [], projects: [], assignments: [],
        companies: [], tempCompanyName: '', tempCompanyUsername: '', tempCompanyPassword: '', tempCompanyExpiryDate: '', tempCompanyDays: '',
        invoices: [], generatedCode: '', tempRetakeActualFile: null, tempAssignmentActualInputFile: null,
        tempProjectActualFile: null, tempAssignmentActualFile: null, tempUploadMainFile: null, tempUploadThumbFile: null,
        tempRetakeThumbFile: null, tempUploadThumbImg: null, tempRetakeThumbImg: null, tempInvoiceRole: 'client',
        tempInvoiceTab: 'list', tempInvoiceFilter: 'all', tempInvoiceSearchQuery: '', expandedInvoiceGroups: [],expandedInvoiceProjects: [],
        unreadNotifications: 0, notificationsOpen: false, subscriptionDetailsOpen: false, notifications: [], last_updated: 0, _contextStartedShotId: null, wallpaperVersion: Date.now()
    };

    function isRootAdmin() { return !!(state.currentUser && state.currentUser.isRootAdmin); }
    function isCompanyAdmin() { return !!(state.currentUser && state.currentUser.isCompanyAdmin); }
    function isSupportMode() { return !!(state.currentUser && state.currentUser.supportMode); }

    function renderSupportOverlay() {
        const appEl = document.getElementById('app');
        if (!appEl || !state.currentUser) return;

        if (isSupportMode()) {
            const banner = document.createElement('div');
            banner.id = 'support-mode-banner';
            banner.className = 'fixed top-3 left-1/2 -translate-x-1/2 z-[95] bg-yellow-500 text-black border border-yellow-300 shadow-2xl rounded-full px-4 py-2 flex items-center gap-3 text-xs md:text-sm font-bold';
            banner.innerHTML = `<span>Support Mode: Viewing ${escapeHTML(state.currentUser.supportCompanyName || state.currentUser.companyName || 'Company')}</span><button onclick="exitSupportMode()" class="bg-black/80 hover:bg-black text-white rounded-full px-3 py-1 text-xs font-bold">Exit Support</button>`;
            appEl.appendChild(banner);
        }

        if (state.currentUser.companyId && !isSupportMode()) {
            const html = renderCompanySubscriptionNavWidget();
            const wrapper = document.createElement('div');
            wrapper.innerHTML = html;
            const widget = wrapper.firstElementChild;
            const mobileTopbar = appEl.querySelector('.mobile-topbar');
            const bell = appEl.querySelector('#notification-bell-container');
            const isMobile = window.innerWidth < 1300;

            if (isMobile && mobileTopbar) {
                const row = document.createElement('div');
                row.id = 'company-subscription-mobile-row';
                row.className = 'subscription-mobile-row';
                row.appendChild(widget);
                mobileTopbar.insertAdjacentElement('afterend', row);
            } else if (bell && bell.parentNode) {
                bell.parentNode.insertBefore(widget, bell);
            } else {
                const row = document.createElement('div');
                row.id = 'company-subscription-mobile-row';
                row.className = 'subscription-mobile-row';
                row.appendChild(widget);
                appEl.insertBefore(row, appEl.firstChild);
            }
        }
    }



    // --- SMOOTH PROJECT DRAG & DROP LOGIC ---
    window.draggedProjectId = null;

    window.applyProjectOrder = function(projectsArray) {
        if (!state.currentUser) return projectsArray;
        const savedOrderStr = localStorage.getItem('projectOrder_' + state.currentUser.id);
        if (savedOrderStr) {
            try {
                const savedOrder = JSON.parse(savedOrderStr);
                return [...projectsArray].sort((a, b) => {
                    const idxA = savedOrder.indexOf(a.id);
                    const idxB = savedOrder.indexOf(b.id);
                    const posA = idxA > -1 ? idxA : 9999;
                    const posB = idxB > -1 ? idxB : 9999;
                    return posA - posB;
                });
            } catch(e) {}
        }
        return projectsArray;
    };

    window.handleDragStart = function(e, id) {
        window.draggedProjectId = id;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', id);

        // Slight delay so the browser grabs the full opacity image for the drag ghost
        setTimeout(() => {
            e.target.style.opacity = '0.3';
            e.target.style.transform = 'scale(0.9)';
        }, 10);
    };

    window.handleDragOver = function(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        const target = e.target.closest('.draggable-project');
        if (target && target.dataset.id !== window.draggedProjectId) {
            // Smoothly push other items away to make a gap
            target.style.transform = 'scale(1.05)';
            target.style.margin = '0 30px';
            target.style.filter = 'brightness(1.2)';
        }
        return false;
    };

    window.handleDragLeave = function(e) {
        const target = e.target.closest('.draggable-project');
        if (target && target.dataset.id !== window.draggedProjectId) {
            // Ensure we aren't just hovering over a child text/image to prevent flickering
            if (!target.contains(e.relatedTarget)) {
                target.style.transform = '';
                target.style.margin = '';
                target.style.filter = '';
            }
        }
    };

    window.handleDrop = function(e, targetId) {
        e.stopPropagation();
        e.preventDefault();

        // Reset all visual styles
        document.querySelectorAll('.draggable-project').forEach(el => {
            el.style.transform = '';
            el.style.margin = '';
            el.style.filter = '';
            el.style.opacity = '1';
        });

        if (window.draggedProjectId && window.draggedProjectId !== targetId) {
            state.projects = window.applyProjectOrder(state.projects);
            const draggedIndex = state.projects.findIndex(p => p.id === window.draggedProjectId);
            const targetIndex = state.projects.findIndex(p => p.id === targetId);

            if (draggedIndex > -1 && targetIndex > -1) {
                const [draggedItem] = state.projects.splice(draggedIndex, 1);
                state.projects.splice(targetIndex, 0, draggedItem);

                const order = state.projects.map(p => p.id);
                localStorage.setItem('projectOrder_' + state.currentUser.id, JSON.stringify(order));

                renderDashboard();
            }
        }
        window.draggedProjectId = null;
    };

    window.handleDragEnd = function(e) {
        e.target.style.opacity = '1';
        e.target.style.transform = '';
        document.querySelectorAll('.draggable-project').forEach(el => {
            el.style.transform = '';
            el.style.margin = '';
            el.style.filter = '';
        });
        window.draggedProjectId = null;
    };
    // ----------------------------------------

    // --- HELPER TO GET TRUE SORT ORDER ---
    window.getShotOrder = function(shot) {
        if (!shot) return 0;
        // 1. Prioritize Manual Names (e.g. if user types '1' or '2')
        if (shot.inputData && shot.inputData.shotNumber && !isNaN(shot.inputData.shotNumber)) return parseFloat(shot.inputData.shotNumber);
        // 2. Prioritize official backend database column
        if (shot.orderIndex !== undefined && shot.orderIndex !== null) return parseFloat(shot.orderIndex);
        // 3. Backwards compatibility for old temp logic
        if (shot.inputData && shot.inputData.customOrder !== undefined && shot.inputData.customOrder !== null) return parseFloat(shot.inputData.customOrder);
        // 4. Default to creation time
        return parseFloat(shot.createdAt);
    };

    // --- HELPER TO GET TRUE SORT ORDER ---
    function getShotOrder(shot) {
        if (!shot) return 0;
        if (shot.inputData && shot.inputData.customOrder) return parseFloat(shot.inputData.customOrder);
        return shot.createdAt;
    }

    window.setPlaybackMode = function(mode) {
        state.playbackMode = mode;
        renderDashboard();

        if (mode === 'single') {
            if (window.autoPlayTimeout) clearTimeout(window.autoPlayTimeout);
            if (window.imageSeqInterval) clearInterval(window.imageSeqInterval);
            setTimeout(() => {
                const player = document.getElementById('ai-movie-player');
                const audio = document.getElementById('ai-movie-audio');
                if (player) {
                    // FIX: Ensure state is explicitly set to true so the UI matches
                    state.isPlaying = true;
                    window.syncPlayState(true);

                    if (player.tagName.toLowerCase() === 'video') {
                        player.play().catch(e => console.log("Autoplay blocked by browser:", e));
                    } else if (player.tagName.toLowerCase() === 'img') {
                        if (audio) audio.play();
                        const seqData = player.getAttribute('data-sequence');
                        if (seqData && seqData !== '[]') {
                            const urls = JSON.parse(seqData);
                            if (urls.length > 1) {

        if (currentIndex > -1) {

            const startIdx = Math.max(0, currentIndex - 1);
            const endIdx = Math.min(epShots.length - 1, currentIndex + 1);

            // Save exactly these 3 shots into a locked mini-playlist
            state.contextSequence = epShots.slice(startIdx, endIdx + 1).map(s => s.id);

    window.togglePlayPause = function() {
        const player = document.getElementById('ai-movie-player');
        const audio = document.getElementById('ai-movie-audio'); // Look for hidden audio
        if (!player) return;

        if (player.tagName.toLowerCase() === 'video') {
            if (player.paused) player.play();
            else player.pause();
        } else if (player.tagName.toLowerCase() === 'img') {
            if (!state.isPlaying) {
                state.isPlaying = true;
                window.syncPlayState(true);
                if (audio) audio.play();

                // Check if this is a multi-image sequence
                const seqData = player.getAttribute('data-sequence');
                if (seqData && seqData !== '[]') {
                    const urls = JSON.parse(seqData);
                    if (urls.length > 1) {
                        // FIX: Clear existing interval before starting a new one
                        if (window.imageSeqInterval) clearInterval(window.imageSeqInterval);
                        window.imageSeqInterval = setInterval(() => {
                            let idx = parseInt(player.getAttribute('data-index') || '0');
                            idx = (idx + 1) % urls.length;
                            player.setAttribute('data-index', idx);
                            player.src = urls[idx];
                        }, 500); // Faster flipbook speed
                        return; // Stop here so it loops instead of skipping to the next shot
                    }
                }

                // Fallback for single images
                if (state.playbackMode === 'single') {
                    state.playbackMode = 'all';
                    state.isLooping = false;
                }
                renderDashboard();
                handleAutoPlayback();
            } else {
                // Pause everything
                if (window.autoPlayTimeout) clearTimeout(window.autoPlayTimeout);
                if (window.imageSeqInterval) clearInterval(window.imageSeqInterval);
                if (audio) audio.pause();
                state.isPlaying = false;
                window.syncPlayState(false);
            }
        }
    };

    // --- NEW: SMART AUTO-PLAYBACK ENGINE ---
    // --- NEW: SMART AUTO-PLAYBACK ENGINE WITH PRELOADER ---
    window.handleAutoPlayback = function() {
        if (window.autoPlayTimeout) clearTimeout(window.autoPlayTimeout);
        if (window.imageSeqInterval) clearInterval(window.imageSeqInterval); // Stop existing slideshows

        // --- PRELOAD NEXT SHOT TO PREVENT BLACK GAP ---
        if (state.playbackMode === 'all' || state.playbackMode === 'context') {
            try {
                let allMovieShots = state.assignments.filter(a => a.projectId === state.currentProject);
                let epShots = allMovieShots.filter(a => ((a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1') === state.selectedEpisode);
                epShots.sort((a, b) => window.getShotOrder(a) - window.getShotOrder(b));
                const currentIndex = epShots.findIndex(s => s.id === state.selectedAiShot);

                if (currentIndex > -1 && currentIndex < epShots.length - 1) {
                    let nextShot = epShots[currentIndex + 1];
                    let nextUrl = null;


                    if (nextShot && nextShot.versions && nextShot.versions.length > 0) {
                        let nextVIndex = 0;
                        if (state.viewingVersions && state.viewingVersions[nextShot.id] !== undefined) {
                            nextVIndex = state.viewingVersions[nextShot.id];
                        } else {
                            nextVIndex = nextShot.versions.findIndex(v => !v.isRetake);
                            if (nextVIndex === -1) nextVIndex = 0;
                        }
                        const nextV = nextShot.versions[nextVIndex];
                        if (nextV && nextV.fileUrl) nextUrl = nextV.fileUrl;
                    }
                     else if (nextShot && nextShot.inputData) {
                        if (nextShot.inputData.startFrame) nextUrl = nextShot.inputData.startFrame;
                        else if (nextShot.inputData.files && nextShot.inputData.files.length > 0) {
                            const imgFiles = nextShot.inputData.files.filter(f => (f.url || f.name).match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i));
                            if (imgFiles.length > 0) nextUrl = imgFiles[0].url;
                        } else if (nextShot.inputData.url) nextUrl = nextShot.inputData.url;
                    }

                    if (nextUrl) {
                        if (nextUrl.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i)) {
                            const imgPreload = new Image();
                            imgPreload.src = nextUrl;
                        } else {
                            // THE FIX: Silently download the video into the browser cache
                            // without waking up the hardware decoder!
                            fetch(nextUrl, { cache: 'force-cache', mode: 'no-cors' }).catch(() => {});
                        }
                    }
                }
            } catch(e) {}
        }
        // ------------------------------------------------

        setTimeout(() => {
            const player = document.getElementById('ai-movie-player');
            const audio = document.getElementById('ai-movie-audio');

            if (player && player.tagName.toLowerCase() === 'video') {
                // Play standard video files
                player.play().catch(e => console.log("Autoplay blocked by browser:", e));
            } else if (player && player.tagName.toLowerCase() === 'img') {

                // Only trigger sequence logic if in Play All or Context mode
                if (state.playbackMode === 'all' || state.playbackMode === 'context') {
                    state.isPlaying = true;
                    window.syncPlayState(true);
                    if (audio) audio.play();

                    let delay = 3000; // Default 3 seconds for a single image
                    const seqData = player.getAttribute('data-sequence');

                    if (seqData && seqData !== '[]') {
                        const urls = JSON.parse(seqData);
                        if (urls.length > 1) {
                            // FIX: Calculate total delay so it exactly matches the number of frames
                            // We multiply by 500ms (the interval speed)
                            delay = urls.length * 500;

                            // Reset index to 0 to ensure we always start at the beginning of the sequence
                            player.setAttribute('data-index', 0);
                            player.src = urls[0];

                            window.imageSeqInterval = setInterval(() => {
                                let idx = parseInt(player.getAttribute('data-index') || '0');
                                idx = (idx + 1) % urls.length;
                                player.setAttribute('data-index', idx);
                                player.src = urls[idx];
                            }, 500); // 500ms flipbook speed
                        }
                    }

                    // Move to the next shot after the calculated delay
                    // Add a tiny 50ms buffer to ensure the very last frame has time to render
                    window.autoPlayTimeout = setTimeout(() => {
                        playNextVideo();
                    }, delay + 50);
                }
            } else if (state.playbackMode === 'all' || state.playbackMode === 'context') {
                // Fallback for empty shots: wait 1 second then skip
                window.autoPlayTimeout = setTimeout(() => {
                    playNextVideo();
                }, 1000);
            }
        }, 150);
    };

    window.nextImageFrame = function() {
        if (window.autoPlayTimeout) clearTimeout(window.autoPlayTimeout);
        if (window.imageSeqInterval) clearInterval(window.imageSeqInterval);
        if (state.isPlaying) togglePlayPause();

        const player = document.getElementById('ai-movie-player');
        if (player && player.tagName.toLowerCase() === 'img') {
            const seqData = player.getAttribute('data-sequence');
            if (seqData && seqData !== '[]') {

                    let idx = parseInt(player.getAttribute('data-index') || '0');
                    idx = (idx + 1) % urls.length;
                    player.setAttribute('data-index', idx);
                    player.src = urls[idx];

                }
            }
        }
        playNextVideo();
    };

    window.prevImageFrame = function() {
        if (window.autoPlayTimeout) clearTimeout(window.autoPlayTimeout);
        if (window.imageSeqInterval) clearInterval(window.imageSeqInterval);
        if (state.isPlaying) togglePlayPause();

        const player = document.getElementById('ai-movie-player');
        if (player && player.tagName.toLowerCase() === 'img') {
            const seqData = player.getAttribute('data-sequence');
            if (seqData && seqData !== '[]') {
                const urls = JSON.parse(seqData);
                if (urls.length > 1) {
                    let idx = parseInt(player.getAttribute('data-index') || '0');
                    idx = (idx - 1 + urls.length) % urls.length;
                    player.setAttribute('data-index', idx);
                    player.src = urls[idx];
                    return;
                }
            }
        }
        playPreviousVideo();
    };

    window.playNextVideo = function() {
        if (window.autoPlayTimeout) clearTimeout(window.autoPlayTimeout);
        if (window.imageSeqInterval) clearInterval(window.imageSeqInterval);

        let allMovieShots = state.assignments.filter(a => a.projectId === state.currentProject);
        let epShots = allMovieShots.filter(a => ((a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1') === state.selectedEpisode);
        epShots.sort((a, b) => window.getShotOrder(a) - window.getShotOrder(b));

        // --- NEW FOOLPROOF CONTEXT LOGIC ---
        if (state.playbackMode === 'context' && state.contextSequence && state.contextSequence.length > 0) {
            const currentSeqIndex = state.contextSequence.indexOf(state.selectedAiShot);

            if (currentSeqIndex > -1 && currentSeqIndex < state.contextSequence.length - 1) {
                // Play the next shot in our 3-shot playlist
                state.selectedAiShot = state.contextSequence[currentSeqIndex + 1];
            } else {
                // Sequence finished! Loop perfectly back to the first context shot
                state.selectedAiShot = state.contextSequence[0];
            }
            renderDashboard();
            handleAutoPlayback();
            return; // Stop here so it doesn't trigger "Play All" logic
        }

        // --- STANDARD PLAY ALL LOGIC ---
        const currentIndex = epShots.findIndex(s => s.id === state.selectedAiShot);
        if (currentIndex > -1) {
            if (currentIndex < epShots.length - 1) {
                state.selectedAiShot = epShots[currentIndex + 1].id;
            } else {
                // End of episode, loop back to the very first shot
                state.selectedAiShot = epShots[0].id;
            }
            renderDashboard();
            handleAutoPlayback();
        }
    };

    window.playPreviousVideo = function() {
        if (window.autoPlayTimeout) clearTimeout(window.autoPlayTimeout);
        if (window.imageSeqInterval) clearInterval(window.imageSeqInterval);
        let allMovieShots = state.assignments.filter(a => a.projectId === state.currentProject);

        // Grab the current project name
        const project = state.projects.find(p => p.id === state.currentProject);
        const projectName = project ? project.name : 'Project';

        const blob = new Blob([textarea.value], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;

        // Clean both names so they are safe for file systems
        const safeProjectName = projectName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        const safeShotName = (shotName || 'Shot').replace(/[^a-z0-9]/gi, '_').toLowerCase();

        // Combine them for the final filename
        a.download = safeProjectName + '_' + safeShotName + '_shotInfo.txt';

        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    };

    window.setModelMode = function(mode) {
        const viewer = document.getElementById('expanded-model');
        if (!viewer) return;
        ['texture', 'gray', 'wireframe'].forEach(m => {
            const btn = document.getElementById('btn-mode-' + m);
            if(btn) {
                if (m === mode) btn.className = "px-3 py-1.5 text-xs font-bold rounded bg-blue-600 text-white transition-colors shadow-sm";
                else btn.className = "px-3 py-1.5 text-xs font-bold rounded text-gray-400 hover:text-white hover:bg-white/10 transition-colors";
            }
        });
        const sceneSymbol = Object.getOwnPropertySymbols(viewer).find(s => s.description === 'scene');
        if (!sceneSymbol) return;
        const scene = viewer[sceneSymbol];

        scene.traverse((child) => {
            if (child.name === 'custom-wireframe-overlay') return;
            if (child.isMesh && child.material) {
                if (!window.originalMaterialsCache.has(child.uuid)) {
                    if (Array.isArray(child.material)) window.originalMaterialsCache.set(child.uuid, child.material.map(m => m.clone()));
                    else window.originalMaterialsCache.set(child.uuid, child.material.clone());
                }
                const origMats = window.originalMaterialsCache.get(child.uuid);
                const existingWireframe = child.children.find(c => c.name === 'custom-wireframe-overlay');
                if (existingWireframe) child.remove(existingWireframe);

                const mutateMaterial = (currentMat, origMat, targetMode) => {
                    if (targetMode === 'gray_base') {
                        currentMat.wireframe = false; currentMat.color.setHex(0x444444);
                        if (currentMat.roughness !== undefined) currentMat.roughness = 0.8;
                        if (currentMat.metalness !== undefined) currentMat.metalness = 0.1;
                        currentMat.map = null; currentMat.normalMap = origMat.normalMap;
                    }
                    else if (targetMode === 'wire_overlay') {
                        currentMat.wireframe = true; currentMat.color.setHex(0x44aaff);
                        if (currentMat.emissive) currentMat.emissive.setHex(0x000000);
                        currentMat.map = null; currentMat.normalMap = null;
                        currentMat.polygonOffset = true; currentMat.polygonOffsetFactor = -1; currentMat.polygonOffsetUnits = -1;
                        currentMat.transparent = true; currentMat.opacity = 0.6;
                    }

                    currentMat.needsUpdate = true;
                };

                if (mode === 'wireframe') {
                    if (Array.isArray(child.material)) child.material.forEach((m, i) => mutateMaterial(m, origMats[i], 'gray_base'));
                    else mutateMaterial(child.material, origMats, 'gray_base');
                    const wireMesh = child.clone(); wireMesh.name = 'custom-wireframe-overlay'; wireMesh.children = [];
                    if (Array.isArray(wireMesh.material)) {
                        wireMesh.material = wireMesh.material.map(m => m.clone());
                        wireMesh.material.forEach((m, i) => mutateMaterial(m, origMats[i], 'wire_overlay'));
                    } else {
                        wireMesh.material = wireMesh.material.clone(); mutateMaterial(wireMesh.material, origMats, 'wire_overlay');
                    }
                    child.add(wireMesh);
                } else if (mode === 'gray') {
                    if (Array.isArray(child.material)) child.material.forEach((m, i) => mutateMaterial(m, origMats[i], 'gray_base'));
                    else mutateMaterial(child.material, origMats, 'gray_base');
                } else if (mode === 'texture') {
                    if (Array.isArray(child.material)) child.material.forEach((m, i) => mutateMaterial(m, origMats[i], 'texture'));
                    else mutateMaterial(child.material, origMats, 'texture');
                }
            }
        });
    };

    function uploadWithProgress(url, formData, filename) {
        return new Promise((resolve) => {
            const id = 'upload_' + Date.now();
            const xhr = new XMLHttpRequest();
            xhr.open('POST', url);
            xhr.upload.onprogress = (e) => {
                if (e.lengthComputable) {

            xhr.onload = () => {
                removeTransferProgress(id);
                let data = {};
                try { data = xhr.responseText ? JSON.parse(xhr.responseText) : {}; } catch(e) { data = { success: false, message: xhr.responseText || 'Upload failed' }; }
                if (xhr.status >= 200 && xhr.status < 300) {
                    resolve({ ok: true, data });

            xhr.onerror = () => {

    }

    function checkForNewActivity(newAssignments) {
        if (!state.currentUser) return;
        const userId = state.currentUser.id; const storageKeyData = `last_state_assignments_${userId}`; const lastStateStr = localStorage.getItem(storageKeyData); let generatedNew = false;

        if (lastStateStr) {
            const lastAssignments = JSON.parse(lastStateStr);
            newAssignments.forEach(newA => {
                const isRelevant = state.currentUser.role === 'admin' || (state.currentUser.allowedProjects && state.currentUser.allowedProjects.includes(newA.projectId));
                if (!isRelevant) return;
                if (state.currentUser.role && state.currentUser.role.toLowerCase().trim() === 'freelancer') {
                    if (!newA.assignedTo || String(newA.assignedTo).replace('u', '') !== String(userId).replace('u', '')) return;
                }
                const oldA = lastAssignments.find(a => a.id === newA.id); const proj = state.projects.find(p => p.id === newA.projectId); const projName = proj ? proj.name : 'Project';

                if (!oldA) { addPersistentNotification(`New Assignment in ${projName}: ${newA.name}`, newA.projectId, newA.id); generatedNew = true;
                } else {
                    if (newA.assignedTo !== oldA.assignedTo && newA.assignedTo == state.currentUser.id) { addPersistentNotification(`You have been assigned to ${projName} > ${newA.name}`, newA.projectId, newA.id); generatedNew = true; }
                    if (newA.currentLevelIndex > oldA.currentLevelIndex) {
                        const prevStage = (oldA.levels && oldA.levels.length > oldA.currentLevelIndex) ? oldA.levels[oldA.currentLevelIndex] : 'Stage';
                        const nextStage = (newA.levels && newA.levels.length > newA.currentLevelIndex) ? newA.levels[newA.currentLevelIndex] : 'Next Stage';
                        addPersistentNotification(`${prevStage} approved, ready for ${nextStage}`, newA.projectId, newA.id);
                        generatedNew = true;
                    }

                    if (newA.status !== oldA.status) {
                        if (newA.status === 'client_approved' && state.currentUser.role === 'admin') {
                            addPersistentNotification(`${newA.name} approved by client`, newA.projectId, newA.id);
                            generatedNew = true;
                        }
                        else if (newA.status === 'approved') {
                            addPersistentNotification(`Final Stage for ${newA.name} is fully APPROVED`, newA.projectId, newA.id);
                            generatedNew = true;
                        }
                        else {
                            let displayStatus = newA.status;
                            if (displayStatus === 'client_approved' || displayStatus === 'uploaded') displayStatus = 'published';
                            addPersistentNotification(`${projName} > ${newA.name} is now ${displayStatus.toUpperCase()}`, newA.projectId, newA.id);
                            generatedNew = true;
                        }
                    }

                    if (newA.versions && oldA.versions && newA.versions.length > oldA.versions.length) {
                        const latestV = newA.versions[0];
                        if (latestV && latestV.isRetake) {
                            addPersistentNotification(`Retake requested on ${projName} > ${newA.name}`, newA.projectId, newA.id);
                        } else {
                            addPersistentNotification(`New file uploaded in ${projName} > ${newA.name}`, newA.projectId, newA.id);
                        }
                        generatedNew = true;
                    }
                }
            });
        }
        localStorage.setItem(storageKeyData, JSON.stringify(newAssignments));
        if (generatedNew) { const bellContainer = document.getElementById('notification-bell-container'); if (bellContainer) bellContainer.innerHTML = renderBell(); }
    }

    function addPersistentNotification(msg, projectId = null, assignmentId = null) {
        const userId = state.currentUser.id; const timeStr = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        state.notifications.unshift({ msg: msg, time: timeStr, projectId: projectId, assignmentId: assignmentId });

    function renderBell() {

        if (state.currentUser) {
            state.notifications.forEach((n, index) => {
                let keep = true;

                    const allowed = state.currentUser.allowedProjects || [];
                    if (n.projectId && !allowed.includes(n.projectId)) keep = false;

                    else {
                         const assignment = state.assignments.find(a => a.id === n.assignmentId);
                         if (!assignment) keep = false;
                         else {
                             const isAssigned = assignment.assignedTo && String(assignment.assignedTo).replace('u', '') === String(state.currentUser.id).replace('u', '');
                             const isCreator = assignment.createdBy && String(assignment.createdBy).replace('u', '') === String(state.currentUser.id).replace('u', '');
                             if (!isAssigned && !isCreator) keep = false;
                         }
                    }
                }
                if (keep) { visibleNotifications.push(n); if (index < state.unreadNotifications) displayUnread++; }
            });
        }

        // Make the bell animate and glow yellow if there are unread notifications
        let currentBellIcon = icons.bell;
        if (displayUnread > 0) {
            currentBellIcon = currentBellIcon.replace('text-gray-300', 'text-yellow-400 drop-shadow-[0_0_8px_rgba(250,204,21,0.6)] animate-bell');
        }

        return `
            <div class="relative cursor-pointer flex items-center justify-center w-10 h-10" onclick="toggleNotifications(event)">

                ${displayUnread > 0 ? `<div class="absolute top-1 right-1 bg-red-500 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center border border-[#383838] shadow animate-pulse z-10">${displayUnread}</div>` : ''}
                ${state.notificationsOpen ? `
                <div class="absolute top-full mt-2 right-0 w-80 bg-[#444] rounded border border-gray-600 overflow-hidden z-[100] flex flex-col max-h-96 cursor-default" onclick="event.stopPropagation()">
                        <div class="p-3 border-b border-gray-600 font-bold text-sm bg-[#333] text-gray-200">Recent Activity</div>
                        <div class="overflow-y-auto flex-1 p-2 space-y-2 text-xs custom-scrollbar">

                                const titleText = assign ? assign.name : (proj ? proj.name : 'System Alert');
                                const stageText = assign ? (assign.levels && assign.levels.length > 0 ? assign.levels[assign.currentLevelIndex] : 'Final') : '';
                                let badgeHtml = ''; const lowerMsg = n.msg.toLowerCase();
                                if (lowerMsg.includes('retake')) badgeHtml = `<span class="bg-red-900/40 text-red-400 border border-red-700/50 px-1.5 py-0.5 rounded text-[9px] font-bold tracking-wide uppercase shadow-sm">Retake</span>`;

                                    const approvedStage = n.msg.split(' approved, ready for ')[0];
                                    badgeHtml = `<span class="bg-green-900/20 text-green-300 border border-green-700/50 px-1.5 py-0.5 rounded text-[9px] font-bold tracking-wide uppercase shadow-sm truncate max-w-[60px]">${approvedStage}</span><span class="bg-green-900/40 text-green-400 border border-green-700/50 px-1.5 py-0.5 rounded text-[9px] font-bold tracking-wide uppercase shadow-sm">Approved</span>`;

                                } else if (lowerMsg.includes('client_approved') || lowerMsg.includes('approved by client')) { badgeHtml = `<span class="bg-orange-900/40 text-orange-400 border border-orange-700/50 px-1.5 py-0.5 rounded text-[9px] font-bold tracking-wide uppercase shadow-sm">Client OK</span>`;
                                } else if (lowerMsg.includes('approved')) { badgeHtml = `<span class="bg-green-900/40 text-green-400 border border-green-700/50 px-1.5 py-0.5 rounded text-[9px] font-bold tracking-wide uppercase shadow-sm">Approved</span>`;

                        </div>

                    </div>

    window.handleNotificationClick = function(projectId, assignmentId, e) {
        if (e) { e.stopPropagation(); e.preventDefault(); }
        if (projectId && projectId !== 'undefined' && projectId !== 'null') state.currentProject = projectId;

        const project = state.projects.find(p => p.id === state.currentProject);
        const isAiMovie = project && project.type === 'Ai movie';

        state.searchQuery = ''; state.sortBy = 'all';

        if (assignmentId && assignmentId !== 'undefined' && assignmentId !== 'null') {
            const targetShot = state.assignments.find(a => a.id === assignmentId);

            // NEW: If it is an AI Movie, jump to the correct episode and select the shot
            if (isAiMovie && targetShot) {
                state.selectedEpisode = (targetShot.inputData && targetShot.inputData.episode) ? targetShot.inputData.episode : 'Episode 1';
                state.selectedAiShot = targetShot.id;
            } else {
                // Standard Dashboard logic
                if (!state.expandedAssignments.includes(assignmentId)) state.expandedAssignments.push(assignmentId);
            }
        }

        state.notificationsOpen = false; renderDashboard();

        if (assignmentId && assignmentId !== 'undefined' && assignmentId !== 'null') {
            setTimeout(() => {
                const targetCard = document.getElementById(`assignment-card-${assignmentId}`);
                if (targetCard) {
                    // Added inline: 'center' so it scrolls perfectly inside the horizontal strip
                    targetCard.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                    const originalBorder = targetCard.style.borderColor;
                    targetCard.style.borderColor = '#3b82f6';
                    targetCard.style.boxShadow = '0 0 15px rgba(59, 130, 246, 0.4)';
                    setTimeout(() => { targetCard.style.borderColor = originalBorder; targetCard.style.boxShadow = ''; }, 2000);
                }
            }, 150);
        }
    };

    function toggleNotifications(e) {
        if (e) e.stopPropagation(); state.notificationsOpen = !state.notificationsOpen;
        if (state.notificationsOpen && state.currentUser) { state.unreadNotifications = 0; localStorage.setItem(`unread_${state.currentUser.id}`, 0); }
        const bellContainer = document.getElementById('notification-bell-container'); if (bellContainer) bellContainer.innerHTML = renderBell();
    }

    function clearNotifications(e) {
        if (e) e.stopPropagation(); state.notifications = []; state.unreadNotifications = 0; state.notificationsOpen = false;
        if (state.currentUser) { localStorage.setItem(`notifs_${state.currentUser.id}`, JSON.stringify([])); localStorage.setItem(`unread_${state.currentUser.id}`, 0); }
        const bellContainer = document.getElementById('notification-bell-container'); if (bellContainer) bellContainer.innerHTML = renderBell();
    }


    // --- DASHBOARD ROUTER ---
    function renderDashboard() {
        const currentProj = state.projects.find(p => p.id === state.currentProject);

        // Intercept for Ai movie workflow
        if (currentProj && currentProj.type === 'Ai movie') {
            if (isMobileView) {
                renderMobileAiMovieDashboard();
            } else {
                renderAiMovieDashboard();
            }
            renderSupportOverlay();
            return;
        }

        // Intercept for Animation workflow
        if (currentProj && currentProj.type === 'Animation') {
            if (isMobileView) {
                renderMobileAnimationDashboard();
            } else {
                renderAnimationDashboard();
            }
            renderSupportOverlay();
            return;
        }

        // Standard Asset/Animation workflow
        if (isMobileView) {
            renderMobileDashboard();
        } else {
            renderDesktopDashboard();
        }
        renderSupportOverlay();
    }

    function renderAiMovieDashboard() {
        const app = document.getElementById('app');
        let visibleProjects = state.projects;
        if (state.currentUser.role !== 'admin') {
            const allowed = state.currentUser.allowedProjects || [];
            visibleProjects = state.projects.filter(p => allowed.includes(p.id));
        }

        let allMovieShots = state.assignments.filter(a => a.projectId === state.currentProject);
        if (state.currentUser.role === 'freelancer' || state.currentUser.role === 'supervisor') {
            allMovieShots = allMovieShots.filter(a => {
                const isAssigned = a.assignedTo && String(a.assignedTo).replace('u', '') === String(state.currentUser.id).replace('u', '');
                const isCreator = a.createdBy && String(a.createdBy).replace('u', '') === String(state.currentUser.id).replace('u', '');
                const isContext = state.playbackMode === 'context' && state.contextSequence && state.contextSequence.includes(a.id);
                return isAssigned || isCreator || isContext;
            });
        }
        allMovieShots.sort((a, b) => window.getShotOrder(a) - window.getShotOrder(b));

        const project = state.projects.find(p => p.id === state.currentProject);
        let episodes = project.episodes || [];
        if (episodes.length === 0) {
            episodes = [...new Set(allMovieShots.map(a => (a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1'))];
        }
        if (!state.selectedEpisode || !episodes.includes(state.selectedEpisode)) {
            state.selectedEpisode = episodes.length > 0 ? episodes[0] : null;
        }

        let aiShots = allMovieShots.filter(a => {
            let ep = (a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1';
            return ep === state.selectedEpisode;
        });

        if (!state.selectedAiShot && aiShots.length > 0) state.selectedAiShot = aiShots[0].id;
        else if (state.selectedAiShot && !aiShots.find(s => s.id === state.selectedAiShot)) state.selectedAiShot = aiShots.length > 0 ? aiShots[0].id : null;

        const currentShot = aiShots.find(s => s.id === state.selectedAiShot);

        let latestVideoUrl = null;
        let isImageMode = false;
        let imageSequence = [];
        let audioUrl = null;
        let activeVIndex = -1;

        // Track selected version or input
        if (currentShot && state.viewingVersions && state.viewingVersions[currentShot.id] !== undefined) {
            activeVIndex = state.viewingVersions[currentShot.id];
        } else if (currentShot && currentShot.versions && currentShot.versions.length > 0) {

            activeVIndex = currentShot.versions.findIndex(v => !v.isRetake);
            if (activeVIndex === -1) activeVIndex = 0;
        }

        // 1. Prioritize uploaded videos ONLY IF 'input' is not explicitly selected
        if (activeVIndex !== 'input' && currentShot && currentShot.versions && currentShot.versions.length > 0) {
            const activeV = currentShot.versions[activeVIndex];
            if (activeV && activeV.fileUrl) latestVideoUrl = activeV.fileUrl;
        }

        // 2. Prioritize videos uploaded directly into 'Input Data'
        if (!latestVideoUrl && currentShot && currentShot.inputData) {
            if (currentShot.inputData.files && currentShot.inputData.files.length > 0) {
                const videoFile = currentShot.inputData.files.find(f => (f.url || f.name).match(/\.(mp4|webm|mov|mkv)(\?.*)?$/i));
                if (videoFile) latestVideoUrl = videoFile.url;
            }
            if (!latestVideoUrl && currentShot.inputData.url && currentShot.inputData.url.match(/\.(mp4|webm|mov|mkv)(\?.*)?$/i)) {
                latestVideoUrl = currentShot.inputData.url;
            }
        }

        // 3. ONLY if no video exists, build the Start/End Frame sequence
        if (!latestVideoUrl && currentShot && currentShot.inputData) {
            if (currentShot.inputData.startFrame) imageSequence.push(currentShot.inputData.startFrame);
            if (currentShot.inputData.endFrame) imageSequence.push(currentShot.inputData.endFrame);

            if (currentShot.inputData.files && currentShot.inputData.files.length > 0) {
                const imgFiles = currentShot.inputData.files.filter(f => (f.url || f.name).match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i));
                const audioFile = currentShot.inputData.files.find(f => (f.url || f.name).match(/\.(mp3|wav|ogg|m4a)(\?.*)?$/i));

                imageSequence.push(...imgFiles.map(f => f.url));
                if (audioFile) audioUrl = audioFile.url;
            }

            if (imageSequence.length > 0) {
                latestVideoUrl = imageSequence[0];
            } else if (currentShot.inputData.url) {
                latestVideoUrl = currentShot.inputData.url;
            }
        }

        if (latestVideoUrl && latestVideoUrl.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i)) {
            isImageMode = true;
        }

        let episodeStripHtml = episodes.map(ep => {
            let epShots = allMovieShots.filter(a => ((a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1') === ep);

            let epThumb = project ? project.img : '';
            let localThumbs = JSON.parse(localStorage.getItem('episodeThumbs_' + (project?project.id:'')) || '{}');
            let dbThumbs = project ? (project.episodeThumbs || {}) : {};

            if (localThumbs[ep]) epThumb = localThumbs[ep];
            else if (dbThumbs[ep]) epThumb = dbThumbs[ep];
            else if (epShots.length > 0 && epShots[0].img) epThumb = epShots[0].img;

            return `
                <div onclick="selectEpisode('${ep}')" class="shrink-0 flex items-center bg-[#333] border ${state.selectedEpisode === ep ? 'border-blue-500 ring-1 ring-blue-500 shadow-md' : 'border-gray-600 hover:border-gray-400'} rounded-lg p-2 min-w-[200px] w-[220px] cursor-pointer relative group transition-all">

    function renderMobileAiMovieDashboard() {
        const app = document.getElementById('app');
        let visibleProjects = state.projects;
        if (state.currentUser.role !== 'admin') {
            const allowed = state.currentUser.allowedProjects || [];
            visibleProjects = state.projects.filter(p => allowed.includes(p.id));
        }
        if (!state.currentProject && visibleProjects.length > 0) state.currentProject = visibleProjects[0].id;
        else if (state.currentProject && !visibleProjects.find(p => p.id === state.currentProject)) state.currentProject = visibleProjects.length > 0 ? visibleProjects[0].id : null;

        let allMovieShots = state.assignments.filter(a => a.projectId === state.currentProject);
        if (state.currentUser.role === 'freelancer' || state.currentUser.role === 'supervisor') {
            allMovieShots = allMovieShots.filter(a => {
                const isAssigned = a.assignedTo && String(a.assignedTo).replace('u', '') === String(state.currentUser.id).replace('u', '');
                const isCreator = a.createdBy && String(a.createdBy).replace('u', '') === String(state.currentUser.id).replace('u', '');
                const isContext = state.playbackMode === 'context' && state.contextSequence && state.contextSequence.includes(a.id);
                return isAssigned || isCreator || isContext;
            });
        }
        allMovieShots.sort((a, b) => getShotOrder(a) - getShotOrder(b));

        const project = state.projects.find(p => p.id === state.currentProject);
        let episodes = window.getProjectEpisodes(state.currentProject);
        if (!state.selectedEpisode || !episodes.includes(state.selectedEpisode)) {
            state.selectedEpisode = episodes.length > 0 ? episodes[0] : null;
        }

        let aiShots = allMovieShots.filter(a => {
            let ep = (a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1';
            return ep === state.selectedEpisode;
        });

        if (!state.selectedAiShot && aiShots.length > 0) state.selectedAiShot = aiShots[0].id;
        else if (state.selectedAiShot && !aiShots.find(s => s.id === state.selectedAiShot)) state.selectedAiShot = aiShots.length > 0 ? aiShots[0].id : null;

        const currentShot = aiShots.find(s => s.id === state.selectedAiShot);

        let latestVideoUrl = null;
        let isImageMode = false;
        let imageSequence = [];
        let audioUrl = null;
        let activeVIndex = -1; // Added to track selected version

        // 1. Prioritize uploaded videos from 'Upload Video' (Versions)
        if (currentShot && currentShot.versions && currentShot.versions.length > 0) {
            if (state.viewingVersions && state.viewingVersions[currentShot.id] !== undefined) {
                activeVIndex = state.viewingVersions[currentShot.id];
            } else {
                activeVIndex = currentShot.versions.findIndex(v => !v.isRetake);
                if (activeVIndex === -1) activeVIndex = 0;
            }
            const activeV = currentShot.versions[activeVIndex];
            if (activeV && activeV.fileUrl) latestVideoUrl = activeV.fileUrl;
        }

        // 2. Prioritize videos uploaded directly into 'Input Data'
        if (!latestVideoUrl && currentShot && currentShot.inputData) {
            if (currentShot.inputData.files && currentShot.inputData.files.length > 0) {
                const videoFile = currentShot.inputData.files.find(f => (f.url || f.name).match(/\.(mp4|webm|mov|mkv)(\?.*)?$/i));
                if (videoFile) latestVideoUrl = videoFile.url;
            }
            if (!latestVideoUrl && currentShot.inputData.url && currentShot.inputData.url.match(/\.(mp4|webm|mov|mkv)(\?.*)?$/i)) {
                latestVideoUrl = currentShot.inputData.url;
            }
        }

        // 3. ONLY if no video exists, build the Start/End Frame sequence
        if (!latestVideoUrl && currentShot && currentShot.inputData) {
            if (currentShot.inputData.startFrame) imageSequence.push(currentShot.inputData.startFrame);
            if (currentShot.inputData.endFrame) imageSequence.push(currentShot.inputData.endFrame);

            if (currentShot.inputData.files && currentShot.inputData.files.length > 0) {
                const imgFiles = currentShot.inputData.files.filter(f => (f.url || f.name).match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i));
                const audioFile = currentShot.inputData.files.find(f => (f.url || f.name).match(/\.(mp3|wav|ogg|m4a)(\?.*)?$/i));

                imageSequence.push(...imgFiles.map(f => f.url));
                if (audioFile) audioUrl = audioFile.url;
            }

            if (imageSequence.length > 0) {
                latestVideoUrl = imageSequence[0];
            } else if (currentShot.inputData.url) {
                latestVideoUrl = currentShot.inputData.url;
            }
        }

        if (latestVideoUrl && latestVideoUrl.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i)) {
            isImageMode = true;
        }

        let episodeStripHtml = episodes.map(ep => {
            let epShots = allMovieShots.filter(a => ((a.inputData && a.inputData.episode) ? a.inputData.episode : 'Episode 1') === ep);
            let epThumb = project ? project.img : '';
            let localThumbs = JSON.parse(localStorage.getItem('episodeThumbs_' + (project?project.id:'')) || '{}');
            let dbThumbs = project ? (project.episodeThumbs || {}) : {};

            if (localThumbs[ep]) epThumb = localThumbs[ep];
            else if (dbThumbs[ep]) epThumb = dbThumbs[ep];
            else if (epShots.length > 0 && epShots[0].img) epThumb = epShots[0].img;

            return `
                <div onclick="selectEpisode('${ep}')" class="shrink-0 flex items-center bg-[#333] border ${state.selectedEpisode === ep ? 'border-blue-500 ring-1 shadow-md' : 'border-gray-600 hover:border-gray-500'} rounded-lg p-1.5 w-[160px] cursor-pointer transition-all relative">
                    <div class="w-8 h-8 bg-black rounded mr-2 shrink-0 overflow-hidden border border-gray-700"><img src="${epThumb}" class="w-full h-full object-cover opacity-80"></div>
                    <div class="flex flex-col flex-1 min-w-0 pr-4"><span class="text-[11px] font-bold text-white truncate">${ep}</span><span class="text-[9px] text-gray-400">${epShots.length} Shots</span></div>
                    ${state.currentUser.role === 'admin' ? `<button onclick="promptDeleteEpisode('${ep}', event)" class="absolute top-1 right-1 text-gray-500 hover:text-red-500 bg-[#222] rounded p-0.5 shadow border border-gray-600" title="Delete"><svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>` : ''}
                </div>`;
        }).join('');

        if (state.currentUser.role === 'admin') {
            episodeStripHtml += `<button onclick="promptAddEpisode()" class="shrink-0 w-10 h-10 bg-[#333] border border-gray-600 border-dashed rounded-lg flex items-center justify-center text-gray-400 hover:text-white transition-all text-xl font-light">+</button>`;
        }

        let shotListHtml = aiShots.map((shot, index) => {
            const isSelected = state.selectedAiShot === shot.id;
            const statusColor = getStatusColor(shot.status);
            const shotNumDisplay = (shot.inputData && shot.inputData.shotNumber) ? shot.inputData.shotNumber : index + 1;

            // CHECK: Highlight if an older version OR 'Base Input' is actively selected
            let isOldVersion = false;
            let viewingVName = '';
            if (state.viewingVersions && state.viewingVersions[shot.id] !== undefined) {
                let defaultVIndex = (shot.versions && shot.versions.length > 0) ? shot.versions.findIndex(v => !v.isRetake) : -1;
                if (defaultVIndex === -1 && shot.versions && shot.versions.length > 0) defaultVIndex = 0;

                if (state.viewingVersions[shot.id] === 'input') {
                    isOldVersion = true;
                    viewingVName = 'Input';
                } else if (state.viewingVersions[shot.id] != defaultVIndex && shot.versions && shot.versions[state.viewingVersions[shot.id]]) {
                    isOldVersion = true;
                    viewingVName = shot.versions[state.viewingVersions[shot.id]].vName;
                }
            }

            let canUpload = false;
            if (state.currentUser.role === 'admin' || state.currentUser.role === 'client' || state.currentUser.role === 'supervisor') canUpload = true;
            if (state.currentUser.role === 'freelancer' && shot.assignedTo == state.currentUser.id) canUpload = true;

            let playPauseBtn = '';
            if (canUpload && (state.currentUser.role === 'admin' || state.currentUser.role === 'freelancer')) {
                if (shot.status === 'paused' || shot.status === 'hold' || shot.status === 'uploaded') { playPauseBtn = `<button onclick="updateStatus('${shot.id}', 'wip'); event.stopPropagation();" class="text-green-400 hover:text-green-300 transition shrink-0" title="Start Work"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>`; }
                else if (shot.status === 'wip' || shot.status === 'retake') { playPauseBtn = `<button onclick="updateStatus('${shot.id}', 'paused'); event.stopPropagation();" class="text-yellow-400 hover:text-yellow-300 transition shrink-0" title="Pause Timer"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg></button>`; }
            }

            let progressHtml = '';
            const currentStageName = (a.levels && a.levels.length > 0) ? a.levels[a.currentLevelIndex] : 'Final';
            const stageMandays = (a.inputData && a.inputData.stageMandays && a.inputData.stageMandays[currentStageName]) ? a.inputData.stageMandays[currentStageName] : null;

            if (stageMandays) {
                let elapsedMs = (a.inputData && a.inputData.stageTimes && a.inputData.stageTimes[currentStageName]) ? a.inputData.stageTimes[currentStageName] : 0;
                if (['wip', 'retake'].includes(a.status)) {
                    elapsedMs += Math.max(0, Date.now() - (a.timerStartedAt || Date.now()));
                }
                const elapsedDays = elapsedMs / (1000 * 60 * 60 * 24);
                const percent = Math.min(100, (elapsedDays / stageMandays) * 100);
                const isOverdue = elapsedDays > stageMandays && a.status !== 'approved';

                let barColor = isOverdue ? 'bg-red-500' : 'bg-blue-500';
                if (a.status === 'approved' || (a.completedLevels && a.completedLevels.some(cl => cl.levelName === currentStageName))) {
                    barColor = 'bg-green-500';
                }

                progressHtml = `<div class="flex flex-col w-full" title="${elapsedDays.toFixed(1)} days elapsed out of ${stageMandays} mandays for ${currentStageName}"><div id="progress-text-${a.id}" class="flex justify-between text-[10px] text-gray-400 mb-1 leading-none"><span class="${isOverdue ? 'text-red-400 font-bold' : ''}">${elapsedDays.toFixed(1)}d</span><span>${stageMandays}d</span></div><div class="w-full bg-[#222] rounded-full h-2 overflow-hidden border border-gray-600"><div id="progress-fill-${a.id}" class="${barColor} h-full transition-all duration-500" style="width: ${percent}%"></div></div></div>`;
            }

            return `
                    <div id="assignment-card-${shot.id}" onclick="selectAiShot('${shot.id}')" class="shrink-0 w-[140px] flex flex-col bg-[#2a2a2a] border ${isSelected ? 'border-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.3)]' : (isOldVersion ? 'border-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.3)]' : 'border-gray-700')} rounded overflow-hidden cursor-pointer relative transition-all">
                    <div class="w-full h-16 bg-black relative">
                        ${isOldVersion ? `<div class="absolute top-1 left-1 bg-orange-600/90 backdrop-blur-sm text-white text-[8px] font-bold px-1 py-0.5 rounded border border-orange-400 z-20 shadow-md">👀 ${viewingVName}</div>` : ''}
                        ${shot.img ? `<img src="${shot.img}" class="w-full h-full object-cover opacity-80">` : ''}
                    </div>
                    <div class="p-1.5 flex flex-col gap-0.5">
                        <div class="flex justify-between items-center w-full">
                            <div class="text-[10px] font-bold text-white truncate pr-1">${shot.name}</div>
                            ${playPauseBtn}
                        </div>
                        <div class="text-[9px] font-mono text-gray-400">#${shotNumDisplay} <span class="ml-1 ${statusColor} capitalize">${shot.status}</span></div>
                        ${progressHtml}
                    </div>
                </div>`;
        }).join('');

        if (aiShots.length === 0) shotListHtml = `<div class="text-gray-500 text-xs italic py-2">${state.selectedEpisode ? 'No shots in ' + state.selectedEpisode : 'Create an Episode first.'}</div>`;

        let versionsHtml = `<div class="text-xs text-gray-500 italic mt-4 text-center">No history to display.</div>`;
        if (currentShot && currentShot.versions && currentShot.versions.length > 0) {
